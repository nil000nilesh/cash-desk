,'Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];\n  const tens = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];\n  function twoDig(x){ if (x<20) return ones[x]; const t=Math.floor(x/10),o=x%10; return tens[t]+(o?' '+ones[o]:''); }\n  function threeDig(x){ const h=Math.floor(x/100), r=x%100; let s=''; if(h)s+=ones[h]+' Hundred'; if(r)s+=(s?' ':'')+twoDig(r); return s; }\n  let out = '';\n  const crore = Math.floor(n / 10000000); n %= 10000000;\n  const lakh  = Math.floor(n / 100000);   n %= 100000;\n  const thou  = Math.floor(n / 1000);     n %= 1000;\n  const rest  = n;\n  if (crore) out += twoDig(crore) + ' Crore ';\n  if (lakh)  out += twoDig(lakh) + ' Lakh ';\n  if (thou)  out += twoDig(thou) + ' Thousand ';\n  if (rest)  out += threeDig(rest);\n  return (out.trim() || 'Zero') + ' Rupees Only';\n}\n\nfunction sumDenoms(d) {\n  return DENOMS.reduce((s, dn) => s + (d[denomKey(dn)] || 0) * dn.val, 0);\n}\nfunction pcsDenoms(d) {\n  return DENOMS.reduce((s, dn) => s + (d[denomKey(dn)] || 0), 0);\n}\n\n// ============ RENDER HELPERS ============\n// Small SVG glyphs for notes / coins so cashier instantly recognises them.\nconst NOTE_GLYPH = (color) => `<svg viewBox=\"0 0 40 24\" class=\"dg-glyph\" width=\"32\" height=\"18\" aria-hidden=\"true\">\n  <rect x=\"1.5\" y=\"1.5\" width=\"37\" height=\"21\" rx=\"2\" fill=\"${color}\" fill-opacity=\"0.18\" stroke=\"${color}\" stroke-width=\"1.2\"/>\n  <circle cx=\"20\" cy=\"12\" r=\"5\" fill=\"none\" stroke=\"${color}\" stroke-width=\"1.2\"/>\n  <text x=\"20\" y=\"15.5\" text-anchor=\"middle\" font-family=\"serif\" font-size=\"7\" font-weight=\"700\" fill=\"${color}\">₹</text>\n  <rect x=\"4\" y=\"4\" width=\"3\" height=\"2\" fill=\"${color}\" fill-opacity=\"0.4\"/>\n  <rect x=\"33\" y=\"18\" width=\"3\" height=\"2\" fill=\"${color}\" fill-opacity=\"0.4\"/>\n</svg>`;\nconst COIN_GLYPH = (color) => `<svg viewBox=\"0 0 24 24\" class=\"dg-glyph\" width=\"22\" height=\"22\" aria-hidden=\"true\">\n  <circle cx=\"12\" cy=\"12\" r=\"10\" fill=\"${color}\" fill-opacity=\"0.18\" stroke=\"${color}\" stroke-width=\"1.4\"/>\n  <circle cx=\"12\" cy=\"12\" r=\"7\" fill=\"none\" stroke=\"${color}\" stroke-width=\"0.8\" stroke-dasharray=\"1.5 1.5\"/>\n  <text x=\"12\" y=\"15.5\" text-anchor=\"middle\" font-family=\"serif\" font-size=\"9\" font-weight=\"700\" fill=\"${color}\">₹</text>\n</svg>`;\n// Colour by denomination — rough match to RBI note colours so cashiers recognise them instantly.\nconst DENOM_COLORS = {\n  500: '#9e7a3f',   // stone / olive (₹500 note)\n  200: '#d8a23a',   // yellow (₹200)\n  100: '#6a4c9c',   // violet (₹100)\n  50:  '#3f8fbf',   // blue (₹50)\n  20:  '#cf8a4a',   // orange-ish (₹20)\n  10:  '#a56a4b',   // brown (₹10)\n  5:   '#4caf72',   // green (₹5 note)\n  2:   '#8a8f99',\n  1:   '#8a8f99'\n};\nfunction denomGlyph(denom) {\n  const c = DENOM_COLORS[denom.val] || 'currentColor';\n  return denom.type === 'note' ? NOTE_GLYPH(c) : COIN_GLYPH(c);\n}\n\nfunction denomCell(denom, qty, onChange, disabled=false) {\n  const k = denomKey(denom);\n  const amt = (qty||0) * denom.val;\n  return `\n    <div class=\"denom-cell denom-${denom.type}\">\n      <div class=\"d-head\">\n        ${denomGlyph(denom)}\n        <span class=\"d-label\"><span class=\"rup\">₹</span>${denom.val}</span>\n      </div>\n      <input type=\"number\" min=\"0\" value=\"${qty||''}\" placeholder=\"0\" data-denom=\"${k}\" ${disabled ? 'disabled' : ''}>\n      <div class=\"d-amt\">= ₹<span class=\"amt-disp\">${fmt(amt)}</span></div>\n    </div>`;\n}\n\n// Build a two-row denom grid: Notes row (top) + Coins row (bottom)\nfunction denomGridHtml(qtyObj, disabled=false) {\n  const notes = DENOMS.filter(d => d.type === 'note');\n  const coins = DENOMS.filter(d => d.type === 'coin');\n  const rowHtml = (label, arr, rowCls) => `\n    <div class=\"denom-row ${rowCls}\">\n      <div class=\"denom-row-label\"><span class=\"drl-tag\">${label}</span></div>\n      <div class=\"denom-row-cells\">${arr.map(d => denomCell(d, (qtyObj||{})[denomKey(d)], null, disabled)).join('')}</div>\n    </div>`;\n  return rowHtml('NOTES', notes, 'row-notes') + rowHtml('COINS', coins, 'row-coins');\n}\n\nfunction buildOpeningGrid() {\n  const grid = document.getElementById('opening-grid');\n  const editable = state.openingManual;\n  grid.innerHTML = denomGridHtml(state.opening, !editable);\n  grid.querySelectorAll('input').forEach(inp => {\n    inp.addEventListener('input', e => {\n      const k = e.target.dataset.denom;\n      state.opening[k] = Math.max(0, parseInt(e.target.value) || 0);\n      const d = DENOMS.find(x => denomKey(x) === k);\n      e.target.closest('.denom-cell').querySelector('.amt-disp').textContent = fmt(state.opening[k] * d.val);\n      updateAll();\n      saveState();\n    });\n  });\n  document.getElementById('opening-mode-pill').textContent = editable ? 'Manual' : 'Auto';\n  document.getElementById('opening-mode-pill').className = editable ? 'pill ok' : 'pill dim';\n  document.getElementById('btn-edit-opening').textContent = editable ? '🔒 Lock' : '✏ Modify';\n}\n\nfunction toggleOpeningEdit() {\n  state.openingManual = !state.openingManual;\n  buildOpeningGrid();\n  saveState();\n}\n\nfunction pullPrevClosing() {\n  if (!state.history || state.history.length === 0) { alert('No previous day history.'); return; }\n  const prev = state.history[state.history.length - 1];\n  state.opening = { ...prev.closing };\n  state.openingManual = false;\n  buildOpeningGrid();\n  updateAll();\n  saveState();\n}\n\n// ============ TRANSACTION TABLES ============\nfunction buildTxnHeader(type) {\n  const headRow = document.getElementById(type+'-head');\n  const headHtml = [\n    `<th style=\"min-width:60px;\">S.No.</th>`,\n    `<th class=\"txt-l\" style=\"min-width:100px;\">${type === 'rec' ? 'A/c No. / Ref' : 'A/c No. / Ref'}</th>`,\n    `<th style=\"min-width:100px;\">Amount ₹</th>`,\n    ...DENOMS.map(d => `<th class=\"${d.type==='note'?'note-h':'coin-h'}\">₹${d.val}<br><span style=\"font-weight:400; font-size:9px; opacity:0.6;\">${d.type}</span></th>`),\n    `<th>Total Notes</th>`,\n    `<th class=\"no-print\">×</th>`\n  ].join('');\n  headRow.innerHTML = headHtml;\n}\n\nfunction buildTxnBody(type) {\n  const list = type === 'rec' ? state.receipts : state.payments;\n  const body = document.getElementById(type+'-body');\n  if (list.length === 0) {\n    body.innerHTML = `<tr><td colspan=\"${DENOMS.length + 5}\" class=\"row-empty\"><div class=\"display\">No ${type === 'rec' ? 'receipts' : 'payments'} yet</div>Click \"+ New Entry\" to begin</td></tr>`;\n    buildTxnFoot(type);\n    return;\n  }\n  body.innerHTML = list.map((row, idx) => {\n    const denomSum = sumDenoms(row.denoms);\n    const tallyOK = Math.abs(denomSum - row.amount) < 0.01;\n    const noteQty = DENOMS.filter(d => d.type === 'note').reduce((s,d)=>s+(row.denoms[denomKey(d)]||0),0);\n    row._amountValid = tallyOK;\n    const serial = row.serial || ((type==='rec'?'R':'P') + (idx+1));\n    return `\n      <tr data-id=\"${row.id}\" data-row-id=\"${row.id}\">\n        <td><span class=\"serial-cell mono\">${serial}</span></td>\n        <td class=\"cell-label\"><input type=\"text\" class=\"txt\" value=\"${row.acno || ''}\" data-field=\"acno\"></td>\n        <td><input type=\"number\" step=\"0.01\" value=\"${row.amount || ''}\" data-field=\"amount\" placeholder=\"0\"></td>\n        ${DENOMS.map(d => `<td><input type=\"number\" min=\"0\" value=\"${row.denoms[denomKey(d)] || ''}\" data-denom=\"${denomKey(d)}\" placeholder=\"0\"></td>`).join('')}\n        <td>${noteQty} pcs</td>\n        <td class=\"no-print\"><button class=\"del-btn\" onclick=\"deleteRow('${type}','${row.id}')\">×</button></td>\n      </tr>`;\n  }).join('');\n  // bind inputs\n  body.querySelectorAll('tr').forEach(tr => {\n    const id = tr.dataset.id;\n    const row = list.find(r => r.id === id);\n    tr.querySelectorAll('input').forEach(inp => {\n      inp.addEventListener('input', e => {\n        const f = e.target.dataset.field;\n        const dk = e.target.dataset.denom;\n        if (f === 'acno') row.acno = e.target.value;\n        else if (f === 'amount') row.amount = parseFloat(e.target.value) || 0;\n        else if (dk) row.denoms[dk] = Math.max(0, parseInt(e.target.value) || 0);\n        // Keep amount validation logic internal; refresh note qty + foot + dashboard\n        const denomSum = sumDenoms(row.denoms);\n        row._amountValid = Math.abs(denomSum - row.amount) < 0.01;\n        const noteQty = DENOMS.filter(d => d.type === 'note').reduce((s,d)=>s+(row.denoms[denomKey(d)]||0),0);\n        const noteCell = tr.querySelector('td:nth-last-child(2)');\n        noteCell.textContent = `${noteQty} pcs`;\n        buildTxnFoot(type);\n        updateAll();\n        saveState();\n      });\n    });\n  });\n  buildTxnFoot(type);\n}\n\nfunction buildTxnFoot(type) {\n  const list = type === 'rec' ? state.receipts : state.payments;\n  const foot = document.getElementById(type+'-foot');\n  const totals = DENOMS.reduce((o, d) => { o[denomKey(d)] = 0; return o; }, {});\n  let amtTotal = 0;\n  let noteTotal = 0;\n  list.forEach(r => {\n    DENOMS.forEach(d => totals[denomKey(d)] += (r.denoms[denomKey(d)] || 0));\n    amtTotal += r.amount || 0;\n    noteTotal += DENOMS.filter(d => d.type === 'note').reduce((s,d)=>s+(r.denoms[denomKey(d)]||0),0);\n  });\n  foot.innerHTML = [\n    `<td></td>`,\n    `<td class=\"txt-l\">Total</td>`,\n    `<td>₹${fmt(amtTotal)}</td>`,\n    ...DENOMS.map(d => `<td>${totals[denomKey(d)] || '—'}</td>`),\n    `<td>${noteTotal} pcs</td>`,\n    `<td class=\"no-print\"></td>`\n  ].join('');\n}\n\nfunction deleteRow(type, id) {\n  if (type === 'rec') state.receipts = state.receipts.filter(r => r.id !== id);\n  else state.payments = state.payments.filter(r => r.id !== id);\n  buildTxnBody(type);\n  updateAll();\n  saveState();\n}\n\nfunction addEmptyRow(type) {\n  const newRow = { id: uid(), acno: '', amount: 0, denoms: emptyDenoms() };\n  if (type === 'rec') state.receipts.push(newRow); else state.payments.push(newRow);\n  buildTxnBody(type);\n  saveState();\n}\n\nfunction clearAllRows(type) {\n  if (!confirm('Clear all '+(type==='rec'?'receipts':'payments')+'?')) return;\n  if (type === 'rec') state.receipts = []; else state.payments = [];\n  buildTxnBody(type);\n  updateAll();\n  saveState();\n}\n\n// ============ ENTRY MODAL ============\nlet entryCtx = { type: 'rec', denoms: emptyDenoms() };\nfunction openEntryModal(type) {\n  entryCtx = { type, denoms: emptyDenoms() };\n  document.getElementById('entry-modal').classList.add('active');\n  const _errReset = document.getElementById('entry-err'); if (_errReset) { _errReset.style.display='none'; _errReset.innerHTML=''; }\n  document.getElementById('entry-title').innerHTML = `${type === 'rec' ? 'New Receipt' : 'New Payment'} <span class=\"kind-tag ${type}\">${type === 'rec' ? 'Receipt' : 'Payment'}</span>`;\n  document.getElementById('entry-acno').value = '';\n  document.getElementById('entry-amount').value = '';\n  const noteEl = document.getElementById('entry-note'); if (noteEl) noteEl.value = '';\n  // Show suggestion row only for payments\n  document.getElementById('entry-suggest').style.display = (type === 'pay') ? 'flex' : 'none';\n  // Reset suggestion preview state\n  pendingSuggestion = null;\n  document.getElementById('entry-suggest-preview').style.display = 'none';\n  document.getElementById('entry-suggest-preview-btn').style.display = 'inline-flex';\n  document.getElementById('entry-suggest-apply-btn').style.display = 'none';\n  document.getElementById('entry-suggest').classList.remove('warn');\n  document.getElementById('entry-suggest-msg').innerHTML = '💡 <strong>Payment suggestion</strong> — 500 & 100 notes first, then rest from available cash.';\n  const grid = document.getElementById('entry-denom-grid');\n  grid.innerHTML = denomGridHtml(entryCtx.denoms);\n  grid.querySelectorAll('input').forEach(inp => {\n    inp.addEventListener('input', e => {\n      const k = e.target.dataset.denom;\n      entryCtx.denoms[k] = Math.max(0, parseInt(e.target.value) || 0);\n      const d = DENOMS.find(x => denomKey(x) === k);\n      e.target.closest('.denom-cell').querySelector('.amt-disp').textContent = fmt(entryCtx.denoms[k] * d.val);\n      updateEntryTally();\n    });\n  });\n  document.getElementById('entry-amount').addEventListener('input', updateEntryTally);\n  updateEntryTally();\n  setTimeout(()=>document.getElementById('entry-acno').focus(), 100);\n}\nfunction updateEntryTally() {\n  const amt = parseFloat(document.getElementById('entry-amount').value) || 0;\n  const denomSum = sumDenoms(entryCtx.denoms);\n  const diff = denomSum - amt;\n  const pill = document.getElementById('entry-tally');\n  const disp = document.getElementById('entry-tally-disp');\n  if (amt === 0 && denomSum === 0) { pill.className='pill dim'; pill.textContent='Enter quantities'; disp.textContent='—'; }\n  else if (Math.abs(diff) < 0.01) { pill.className='pill ok'; pill.textContent='✓ Matched'; disp.innerHTML=`<span style=\"color:var(--pos)\">Matched ₹${fmt(denomSum)}</span>`; }\n  else { pill.className='pill err'; pill.textContent=`Diff ₹${fmt(diff)}`; disp.innerHTML=`<span style=\"color:var(--neg)\">Amount ₹${fmt(amt)} · Denoms ₹${fmt(denomSum)} · Diff ₹${fmt(diff)}</span>`; }\n  const _nc=DENOMS.filter(d=>d.type==='note').reduce((s,d)=>s+(entryCtx.denoms[denomKey(d)]||0),0);\n  const _cc=DENOMS.filter(d=>d.type==='coin').reduce((s,d)=>s+(entryCtx.denoms[denomKey(d)]||0),0);\n  const _vl=document.getElementById('entry-note-count-val');\n  const _cv=document.getElementById('entry-coin-count-val');\n  if(_vl)_vl.textContent=_nc;\n  if(_cv)_cv.textContent=_cc;\n}\nfunction closeEntryModal() { document.getElementById('entry-modal').classList.remove('active'); }\n\n// Compute available cash on hand = opening + receipts − payments + exchange-net\nfunction computeAvailableDenoms() {\n  const out = emptyDenoms();\n  DENOMS.forEach(d => {\n    const k = denomKey(d);\n    const recT = state.receipts.reduce((s, r) => s + (r.denoms[k] || 0), 0);\n    const payT = state.payments.reduce((s, p) => s + (p.denoms[k] || 0), 0);\n    const exT  = state.exchanges.reduce((s, ex) => s + ((ex.given[k]||0) - (ex.received[k]||0)), 0);\n    out[k] = (state.opening[k] || 0) + recT - payT + exT;\n    if (out[k] < 0) out[k] = 0;\n  });\n  return out;\n}\n\n// Payment auto-suggest:\n// 1) Prefer ₹500 notes in full packets of 100 pcs (₹50,000 per packet) — customer preference.\n// 2) Then ₹100 notes in full packets of 100 pcs (₹10,000 per packet).\n// 3) Top up remainder greedily from biggest to smallest (500 → 1), but only up to what's available on hand.\nlet pendingSuggestion = null; // stores { plan, amount, rem, filled }\n\nfunction computePaymentPlan(amount) {\n  const avail = computeAvailableDenoms();\n  const plan = emptyDenoms();\n  let rem = Math.round(amount);\n\n  const take = (k, count) => {\n    const c = Math.max(0, Math.min(count, avail[k] - plan[k]));\n    if (c <= 0) return 0;\n    const d = DENOMS.find(x => denomKey(x) === k);\n    const cash = c * d.val;\n    if (cash > rem) return 0;\n    plan[k] += c;\n    rem -= cash;\n    return c;\n  };\n\n  // Phase 1: bundle 500s (100 pcs = ₹50,000)\n  while (rem >= 50000 && avail['500n'] - plan['500n'] >= 100) take('500n', 100);\n  // Phase 2: bundle 100s (100 pcs = ₹10,000)\n  while (rem >= 10000 && avail['100n'] - plan['100n'] >= 100) take('100n', 100);\n  // Phase 3: greedy big→small — 500, 200, 100, 50, 20n, 10n, 20c, 10c, 5c, 2c, 1c\n  for (const d of DENOMS) {\n    const k = denomKey(d);\n    if (rem <= 0) break;\n    const maxByRem = Math.floor(rem / d.val);\n    take(k, maxByRem);\n  }\n\n  return { plan, rem, filled: sumDenoms(plan) };\n}\n\nfunction previewPaymentSuggestion() {\n  const amtInput = document.getElementById('entry-amount');\n  let amount = parseFloat(amtInput.value) || 0;\n  if (amount <= 0) { alert('Pehle amount enter karo, fir suggestion dikhega.'); amtInput.focus(); return; }\n\n  const { plan, rem, filled } = computePaymentPlan(amount);\n  pendingSuggestion = { plan, amount, rem, filled };\n\n  // Build preview HTML — big→small order\n  const items = [];\n  const bundle500 = Math.floor((plan['500n'] || 0) / 100);\n  const bundle100 = Math.floor((plan['100n'] || 0) / 100);\n\n  for (const d of DENOMS) {\n    const k = denomKey(d);\n    const qty = plan[k] || 0;\n    if (qty === 0) continue;\n    const amt = qty * d.val;\n    let sub = '';\n    if (k === '500n' && bundle500 > 0) sub = `<div class=\"sp-sub\">${bundle500} packet${bundle500>1?'s':''} × 100 pcs</div>`;\n    else if (k === '100n' && bundle100 > 0) sub = `<div class=\"sp-sub\">${bundle100} packet${bundle100>1?'s':''} × 100 pcs</div>`;\n    const isBundle = (k === '500n' && bundle500 > 0) || (k === '100n' && bundle100 > 0);\n    items.push(`\n      <div class=\"sp-item ${isBundle ? 'is-bundle' : ''}\">\n        <div>\n          <div class=\"sp-denom\">₹${d.val} ${d.type === 'coin' ? 'coin' : 'note'}</div>\n          <div class=\"sp-qty\">${qty} pcs</div>\n          ${sub}\n        </div>\n        <div class=\"sp-amt\">₹${fmt(amt)}</div>\n      </div>`);\n  }\n\n  const previewEl = document.getElementById('entry-suggest-preview');\n  const shortMsg = rem > 0 ? `<div class=\"sp-note\">⚠ Short by <strong>₹${fmt(rem)}</strong> — available cash me itne denominations nahi hai.</div>` : `<div class=\"sp-note\">✓ Plan ready. \"Apply\" dabakar denominations fill karo.</div>`;\n\n  previewEl.innerHTML = `\n    <div class=\"sp-hdr\">\n      <div class=\"sp-title\">🎯 Suggested Breakdown</div>\n      <div class=\"sp-total\">₹${fmt(filled)} / ₹${fmt(amount)}</div>\n    </div>\n    <div class=\"sp-list\">${items.join('') || '<div class=\"sp-note\">No plan could be built — check available cash.</div>'}</div>\n    ${shortMsg}\n  `;\n  previewEl.classList.toggle('warn', rem > 0);\n  previewEl.style.display = 'block';\n\n  // Toggle buttons: hide Suggest, show Apply\n  document.getElementById('entry-suggest-preview-btn').style.display = 'none';\n  document.getElementById('entry-suggest-apply-btn').style.display = 'inline-flex';\n\n  // Update banner\n  const msg = document.getElementById('entry-suggest-msg');\n  const row = document.getElementById('entry-suggest');\n  row.classList.toggle('warn', rem > 0);\n  msg.innerHTML = rem > 0\n    ? `⚠ Preview shows shortage. Review and click Apply to fill anyway.`\n    : `✓ Preview ready. Click <strong>Apply</strong> to fill denominations.`;\n}\n\nfunction applyPaymentSuggestion() {\n  if (!pendingSuggestion) { previewPaymentSuggestion(); return; }\n  const { plan, amount, rem, filled } = pendingSuggestion;\n\n  // Apply plan to entryCtx + UI\n  entryCtx.denoms = { ...plan };\n  const grid = document.getElementById('entry-denom-grid');\n  grid.innerHTML = denomGridHtml(entryCtx.denoms);\n  grid.querySelectorAll('input').forEach(inp => {\n    inp.addEventListener('input', e => {\n      const k = e.target.dataset.denom;\n      entryCtx.denoms[k] = Math.max(0, parseInt(e.target.value) || 0);\n      const d = DENOMS.find(x => denomKey(x) === k);\n      e.target.closest('.denom-cell').querySelector('.amt-disp').textContent = fmt(entryCtx.denoms[k] * d.val);\n      updateEntryTally();\n    });\n  });\n\n  // Hide preview, reset buttons\n  document.getElementById('entry-suggest-preview').style.display = 'none';\n  document.getElementById('entry-suggest-preview-btn').style.display = 'inline-flex';\n  document.getElementById('entry-suggest-apply-btn').style.display = 'none';\n  pendingSuggestion = null;\n\n  // Messaging\n  const msg = document.getElementById('entry-suggest-msg');\n  const row = document.getElementById('entry-suggest');\n  if (rem > 0) {\n    row.classList.add('warn');\n    msg.innerHTML = `⚠ <strong>Short by ₹${fmt(rem)}</strong> — filled ₹${fmt(filled)} of ₹${fmt(amount)}.`;\n  } else {\n    row.classList.remove('warn');\n    const parts = [];\n    if (plan['500n'] >= 100) parts.push(`${Math.floor(plan['500n']/100)} packet(s) of ₹500`);\n    if (plan['100n'] >= 100) parts.push(`${Math.floor(plan['100n']/100)} packet(s) of ₹100`);\n    msg.innerHTML = `✓ <strong>Filled ₹${fmt(filled)}</strong>${parts.length ? ' — ' + parts.join(', ') : ''}. Verify before saving.`;\n  }\n  updateEntryTally();\n}\n\nfunction clearEntryDenoms() {\n  entryCtx.denoms = emptyDenoms();\n  pendingSuggestion = null;\n  document.getElementById('entry-suggest-preview').style.display = 'none';\n  document.getElementById('entry-suggest-preview-btn').style.display = 'inline-flex';\n  document.getElementById('entry-suggest-apply-btn').style.display = 'none';\n  const grid = document.getElementById('entry-denom-grid');\n  grid.innerHTML = denomGridHtml(entryCtx.denoms);\n  grid.querySelectorAll('input').forEach(inp => {\n    inp.addEventListener('input', e => {\n      const k = e.target.dataset.denom;\n      entryCtx.denoms[k] = Math.max(0, parseInt(e.target.value) || 0);\n      const d = DENOMS.find(x => denomKey(x) === k);\n      e.target.closest('.denom-cell').querySelector('.amt-disp').textContent = fmt(entryCtx.denoms[k] * d.val);\n      updateEntryTally();\n    });\n  });\n  document.getElementById('entry-suggest').classList.remove('warn');\n  document.getElementById('entry-suggest-msg').innerHTML = '💡 <strong>Payment suggestion</strong> — 500 & 100 notes first, then rest from available cash.';\n  updateEntryTally();\n}\nfunction showEntryError(titleHtml, bodyHtml, fixHtml) {\n  const el = document.getElementById('entry-err');\n  if (!el) { alert(titleHtml.replace(/<[^>]+>/g,'') + '\\n\\n' + bodyHtml.replace(/<[^>]+>/g,'\\n').replace(/\\n\\n+/g,'\\n') + '\\n\\n' + fixHtml.replace(/<[^>]+>/g,'\\n').replace(/\\n\\n+/g,'\\n')); return; }\n  el.innerHTML = `<div class=\"title\">${titleHtml}</div><div>${bodyHtml}</div>` + (fixHtml ? `<div class=\"fix\">${fixHtml}</div>` : '');\n  el.style.display = '';\n  const body = document.querySelector('#entry-modal .modal-b');\n  if (body) body.scrollTop = 0;\n}\nfunction clearEntryError() {\n  const el = document.getElementById('entry-err');\n  if (el) { el.style.display = 'none'; el.innerHTML = ''; }\n}\nfunction saveEntry() {\n  clearEntryError();\n  const acno = document.getElementById('entry-acno').value.trim();\n  const enteredAmt = parseFloat(document.getElementById('entry-amount').value) || 0;\n  const denomSum = sumDenoms(entryCtx.denoms);\n  if (!enteredAmt && denomSum === 0) {\n    showEntryError('⚠ Empty entry', 'Aapne na Total Amount daala hai, na koi denomination quantity.', 'Top field me amount likhein <strong>YA</strong> niche denomination boxes me notes/coins ki quantity enter karein.');\n    return;\n  }\n  // Validation 1: amount vs denomination mismatch\n  if (enteredAmt > 0 && denomSum > 0 && Math.abs(enteredAmt - denomSum) >= 0.01) {\n    const diff = denomSum - enteredAmt;\n    const excess = diff > 0;\n    const body = `<ul><li>Total Amount: <strong>₹${fmt(enteredAmt)}</strong></li><li>Denominations Sum: <strong>₹${fmt(denomSum)}</strong></li><li>Difference: <strong>₹${fmt(Math.abs(diff))}</strong> ${excess ? '(denominations zyada hain)' : '(denominations kam hain)'}</li></ul>`;\n    const fix = excess\n      ? `🔧 <strong>Theek karein:</strong><br>• <em>Ya to</em> Total Amount badhakar <strong>₹${fmt(denomSum)}</strong> karein.<br>• <em>Ya</em> denomination quantities kam karein taaki total ghatke <strong>₹${fmt(enteredAmt)}</strong> ho jaaye.`\n      : `🔧 <strong>Theek karein:</strong><br>• <em>Ya to</em> denomination quantities badhakar total <strong>₹${fmt(enteredAmt)}</strong> tak laayein.<br>• <em>Ya</em> Total Amount ghataakar <strong>₹${fmt(denomSum)}</strong> karein.`;\n    showEntryError('❌ Amount aur denominations match nahi ho rahe', body, fix);\n    return;\n  }\n  // Validation 2: payment — check each denomination is available in cash on hand\n  if (entryCtx.type === 'pay') {\n    const avail = computeAvailableDenoms();\n    const shortage = [];\n    DENOMS.forEach(d => {\n      const k = denomKey(d);\n      const need = entryCtx.denoms[k] || 0;\n      const have = avail[k] || 0;\n      if (need > 0 && need > have) shortage.push({ d, need, have, short: need - have });\n    });\n    if (shortage.length > 0) {\n      const shortLines = shortage.map(s => `<li><strong>₹${s.d.val} ${s.d.type}</strong>: chahiye <strong>${s.need}</strong> pcs, available sirf <strong>${s.have}</strong> pcs — <strong>${s.short} pcs short</strong></li>`);\n      const availLines = DENOMS.filter(d => (avail[denomKey(d)]||0) > 0).map(d => `₹${d.val} ${d.type}: ${avail[denomKey(d)]}`);\n      const body = `Available cash me niche likhi denominations kam hain:<ul>${shortLines.join('')}</ul>` + (availLines.length ? `<div style=\"margin-top:6px;font-size:12px;opacity:0.85;\"><em>Available abhi:</em> ${availLines.join(' · ')}</div>` : '');\n      const fix = `🔧 <strong>Theek karein:</strong><br>• Short walli denominations ki quantity kam karein aur doosri available denominations se balance banayein.<br>• Ya modal me <strong>🎯 Suggest</strong> button dabakar auto-plan lein jo sirf available cash use karta hai.<br>• Ya <em>Tools → Denomination Breakdown</em> me amount daalkar optimal mix dekhein.`;\n      showEntryError('❌ Available cash me ye notes/coins nahi hain', body, fix);\n      return;\n    }\n  }\n  const amount = enteredAmt || denomSum;\n  const serial = nextSerial(entryCtx.type);\n  const note = (document.getElementById('entry-note').value || '').trim();\n  const row = { id: uid(), serial, acno, amount, denoms: { ...entryCtx.denoms }, note, ts: Date.now() };\n  if (entryCtx.type === 'rec') state.receipts.push(row); else state.payments.push(row);\n  closeEntryModal();\n  buildTxnBody(entryCtx.type);\n  updateAll();\n  saveState();\n  showVoucherPopup(row, entryCtx.type);\n}\n\n// ============ EXCHANGE MODAL ============\nlet exchCtx = { given: emptyDenoms(), received: emptyDenoms() };\nfunction openExchangeModal() {\n  exchCtx = { given: emptyDenoms(), received: emptyDenoms() };\n  document.getElementById('exch-modal').classList.add('active');\n  document.getElementById('exch-ref').value = '';\n  document.getElementById('exch-note').value = '';\n  const gGrid = document.getElementById('exch-g-grid');\n  const rGrid = document.getElementById('exch-r-grid');\n  gGrid.innerHTML = denomGridHtml(exchCtx.given);\n  rGrid.innerHTML = denomGridHtml(exchCtx.received);\n  gGrid.querySelectorAll('input').forEach(inp => {\n    inp.addEventListener('input', e => {\n      exchCtx.given[e.target.dataset.denom] = Math.max(0, parseInt(e.target.value) || 0);\n      const d = DENOMS.find(x => denomKey(x) === e.target.dataset.denom);\n      e.target.closest('.denom-cell').querySelector('.amt-disp').textContent = fmt(exchCtx.given[e.target.dataset.denom] * d.val);\n      updateExchTally();\n    });\n  });\n  rGrid.querySelectorAll('input').forEach(inp => {\n    inp.addEventListener('input', e => {\n      exchCtx.received[e.target.dataset.denom] = Math.max(0, parseInt(e.target.value) || 0);\n      const d = DENOMS.find(x => denomKey(x) === e.target.dataset.denom);\n      e.target.closest('.denom-cell').querySelector('.amt-disp').textContent = fmt(exchCtx.received[e.target.dataset.denom] * d.val);\n      updateExchTally();\n    });\n  });\n  updateExchTally();\n  setTimeout(()=>document.getElementById('exch-ref').focus(), 100);\n}\nfunction updateExchTally() {\n  const gSum = sumDenoms(exchCtx.given);\n  const rSum = sumDenoms(exchCtx.received);\n  document.getElementById('exch-g-sum').textContent = fmt(gSum);\n  document.getElementById('exch-r-sum').textContent = fmt(rSum);\n  const bal = document.getElementById('exch-balance');\n  if (gSum === 0 && rSum === 0) { bal.className = 'exch-balance empty'; bal.textContent = '⚖ Enter both sides — they must match'; }\n  else if (Math.abs(gSum - rSum) < 0.01) { bal.className = 'exch-balance ok'; bal.textContent = `✓ Balanced — ₹${fmt(gSum)} each side`; }\n  else { bal.className = 'exch-balance err'; bal.textContent = `✗ Difference ₹${fmt(gSum - rSum)} (Given ₹${fmt(gSum)} vs Received ₹${fmt(rSum)})`; }\n}\nfunction closeExchangeModal() { document.getElementById('exch-modal').classList.remove('active'); }\nfunction saveExchange() {\n  const gSum = sumDenoms(exchCtx.given);\n  const rSum = sumDenoms(exchCtx.received);\n  if (gSum === 0 || rSum === 0) { alert('Both sides must have denominations'); return; }\n  if (Math.abs(gSum - rSum) >= 0.01) { if (!confirm(`Amounts don't match (diff ₹${fmt(gSum-rSum)}). Save anyway?`)) return; }\n  const serial = nextSerial('exch');\n  const row = {\n    id: uid(),\n    serial,\n    ref: document.getElementById('exch-ref').value.trim(),\n    note: document.getElementById('exch-note').value.trim(),\n    given: { ...exchCtx.given },\n    received: { ...exchCtx.received },\n    amount: gSum,\n    ts: Date.now()\n  };\n  state.exchanges.push(row);\n  closeExchangeModal();\n  buildExchBody();\n  updateAll();\n  saveState();\n  showVoucherPopup(row, 'exch');\n}\n\n// ============ VOUCHER POPUP ============\nfunction showVoucherPopup(row, type) {\n  const kinds = { rec: { label: 'Receipt', color: 'pos' }, pay: { label: 'Payment', color: 'neg' }, exch: { label: 'Exchange', color: 'info' } };\n  const k = kinds[type] || kinds.rec;\n  document.getElementById('v-serial').textContent = row.serial || '—';\n  document.getElementById('v-serial').className = `vc-serial ${k.color}`;\n  document.getElementById('v-serial-inline').textContent = row.serial || '—';\n  document.getElementById('v-kind').textContent = k.label;\n  document.getElementById('v-amt').textContent = fmt(row.amount || sumDenoms(row.denoms || row.given || {}));\n  document.getElementById('v-acc').textContent = row.acno || row.ref || '—';\n  const d = new Date(row.ts || Date.now());\n  const pad = n => String(n).padStart(2, '0');\n  document.getElementById('v-time').textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;\n  const _vd = row.denoms || row.given || {};\n  const _vn = DENOMS.filter(x=>x.type==='note').reduce((s,x)=>s+(_vd[denomKey(x)]||0),0);\n  const _vc = DENOMS.filter(x=>x.type==='coin').reduce((s,x)=>s+(_vd[denomKey(x)]||0),0);\n  document.getElementById('v-notes').textContent = _vn;\n  document.getElementById('v-coins').textContent = _vc;\n  document.getElementById('voucher-modal').classList.add('active');\n}\nfunction closeVoucher() { document.getElementById('voucher-modal').classList.remove('active'); }\n\n// ============ SEARCH ============\nfunction openSearchModal() {\n  document.getElementById('search-modal').classList.add('active');\n  document.getElementById('search-serial').value = '';\n  document.getElementById('search-result').innerHTML = '<div class=\"sr-empty\">Enter a serial number above and press Enter</div>';\n  setTimeout(() => document.getElementById('search-serial').focus(), 100);\n}\nfunction closeSearch() { document.getElementById('search-modal').classList.remove('active'); }\n\nfunction findBySerial(q) {\n  const needle = q.trim().toUpperCase();\n  if (!needle) return null;\n  // Exact serial match\n  for (const r of state.receipts) if ((r.serial||'').toUpperCase() === needle) return { row: r, type: 'rec' };\n  for (const r of state.payments) if ((r.serial||'').toUpperCase() === needle) return { row: r, type: 'pay' };\n  for (const r of state.exchanges) if ((r.serial||'').toUpperCase() === needle) return { row: r, type: 'exch' };\n  // Fuzzy on ref/acno\n  const ql = q.trim().toLowerCase();\n  for (const r of state.receipts) if ((r.acno||'').toLowerCase().includes(ql)) return { row: r, type: 'rec' };\n  for (const r of state.payments) if ((r.acno||'').toLowerCase().includes(ql)) return { row: r, type: 'pay' };\n  for (const r of state.exchanges) if (((r.ref||'')+' '+(r.note||'')).toLowerCase().includes(ql)) return { row: r, type: 'exch' };\n  return null;\n}\n\nfunction runSearch() {\n  const q = document.getElementById('search-serial').value;\n  const out = document.getElementById('search-result');\n  if (!q.trim()) { out.innerHTML = '<div class=\"sr-empty\">Enter a serial number above and press Enter</div>'; return; }\n  const hit = findBySerial(q);\n  if (!hit) {\n    out.innerHTML = `<div class=\"sr-empty sr-miss\">No transaction found for \"<span class=\"mono\">${q}</span>\"</div>`;\n    return;\n  }\n  const { row, type } = hit;\n  const kinds = { rec: { label: 'Receipt', color: 'pos', sign: '+' }, pay: { label: 'Payment', color: 'neg', sign: '−' }, exch: { label: 'Exchange', color: 'info', sign: '±' } };\n  const k = kinds[type];\n  const d = new Date(row.ts || 0);\n  const pad = n => String(n).padStart(2, '0');\n  const timeStr = row.ts ? `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}` : '—';\n\n  let denomHtml = '';\n  if (type === 'exch') {\n    denomHtml = `\n      <div class=\"sr-denom-sep\">\n        <div class=\"sr-denom-col\">\n          <div class=\"sr-denom-title\">Given (In)</div>\n          <div class=\"sr-denom-body\">${denomSummaryText(row.given)}</div>\n        </div>\n        <div class=\"sr-denom-col\">\n          <div class=\"sr-denom-title\">Received (Out)</div>\n          <div class=\"sr-denom-body\">${denomSummaryText(row.received)}</div>\n        </div>\n      </div>`;\n  } else {\n    denomHtml = `\n      <div class=\"sr-denom\">\n        <div class=\"sr-denom-title\">Denomination Breakdown</div>\n        <div class=\"sr-denom-body\">${denomSummaryText(row.denoms)}</div>\n      </div>`;\n  }\n\n  out.innerHTML = `\n    <div class=\"sr-card ${k.color}\">\n      <div class=\"sr-head\">\n        <span class=\"sr-serial mono\">${row.serial || '—'}</span>\n        <span class=\"sr-kind\">${k.label}</span>\n        <span class=\"sr-time mono\">${timeStr}</span>\n      </div>\n      <div class=\"sr-amt\"><span class=\"mono\">${k.sign} ₹${fmt(row.amount || sumDenoms(row.given||row.denoms||{}))}</span></div>\n      <div class=\"sr-row\"><span>A/c / Ref</span><strong>${row.acno || row.ref || '—'}</strong></div>\n      ${row.note ? `<div class=\"sr-row\"><span>Note</span><strong>${row.note}</strong></div>` : ''}\n      ${denomHtml}\n      <div class=\"sr-actions\">\n        <button class=\"btn btn-ghost btn-sm\" onclick=\"jumpToRow('${type}','${row.id}')\">Go to ${k.label}s tab →</button>\n      </div>\n    </div>`;\n}\n\nfunction jumpToRow(type, id) {\n  closeSearch();\n  const tabMap = { rec: 'receipts', pay: 'payments', exch: 'exchanges' };\n  switchTab(tabMap[type]);\n  setTimeout(() => {\n    const el = document.querySelector(`[data-row-id=\"${id}\"]`);\n    if (el) {\n      el.classList.add('row-flash');\n      const r = el.getBoundingClientRect();\n      window.scrollTo({ top: window.scrollY + r.top - window.innerHeight/2, behavior: 'smooth' });\n      setTimeout(() => el.classList.remove('row-flash'), 2000);\n    }\n  }, 300);\n}\n\n// Exchange table\nfunction buildExchHeader() {\n  document.getElementById('exch-head').innerHTML = [\n    `<th style=\"min-width:60px;\">S.No.</th>`,\n    `<th class=\"txt-l\" style=\"min-width:120px;\">Ref / Party</th>`,\n    `<th style=\"min-width:90px;\">Amount ₹</th>`,\n    `<th style=\"min-width:200px;\">Given (in)</th>`,\n    `<th style=\"min-width:200px;\">Received (out)</th>`,\n    `<th>Note</th>`,\n    `<th class=\"no-print\">×</th>`\n  ].join('');\n}\nfunction denomSummaryText(d) {\n  const parts = DENOMS.filter(dn => (d[denomKey(dn)]||0) > 0)\n    .map(dn => `${d[denomKey(dn)]}×₹${dn.val}`);\n  return parts.join(', ') || '—';\n}\nfunction buildExchBody() {\n  const body = document.getElementById('exch-body');\n  if (state.exchanges.length === 0) {\n    body.innerHTML = `<tr><td colspan=\"7\" class=\"row-empty\"><div class=\"display\">No exchanges yet</div>Click \"+ New Exchange\" to begin</td></tr>`;\n    buildExchFoot();\n    return;\n  }\n  body.innerHTML = state.exchanges.map((ex, idx) => {\n    const gSum = sumDenoms(ex.given);\n    const serial = ex.serial || ('E' + (idx+1));\n    return `<tr data-row-id=\"${ex.id}\">\n      <td><span class=\"serial-cell mono\">${serial}</span></td>\n      <td class=\"cell-label\">${ex.ref || '—'}</td>\n      <td class=\"mono\">₹${fmt(gSum)}</td>\n      <td class=\"mono\" style=\"font-size:11px; text-align:left; padding: 8px 10px;\">${denomSummaryText(ex.given)}</td>\n      <td class=\"mono\" style=\"font-size:11px; text-align:left; padding: 8px 10px;\">${denomSummaryText(ex.received)}</td>\n      <td style=\"text-align:left; padding: 8px 10px; font-size:12px;\">${ex.note || '—'}</td>\n      <td class=\"no-print\"><button class=\"del-btn\" onclick=\"deleteExchange('${ex.id}')\">×</button></td>\n    </tr>`;\n  }).join('');\n  buildExchFoot();\n}\nfunction buildExchFoot() {\n  const total = state.exchanges.reduce((s, ex) => s + sumDenoms(ex.given), 0);\n  document.getElementById('exch-foot').innerHTML = `<td></td><td class=\"txt-l\">Total (${state.exchanges.length})</td><td>₹${fmt(total)}</td><td colspan=\"4\"></td>`;\n}\nfunction deleteExchange(id) {\n  state.exchanges = state.exchanges.filter(ex => ex.id !== id);\n  buildExchBody();\n  updateAll();\n  saveState();\n}\nfunction clearAllExchanges() {\n  if (!confirm('Clear all exchanges?')) return;\n  state.exchanges = [];\n  buildExchBody();\n  updateAll();\n  saveState();\n}\n\n// ============ DOCKET ============\nfunction buildDocket() {\n  const head = document.getElementById('docket-head');\n  head.innerHTML = [\n    `<th class=\"txt-l\">Stage</th>`,\n    ...DENOMS.map(d => `<th class=\"${d.type==='note'?'note-h':'coin-h'}\">₹${d.val}</th>`),\n    `<th>Total ₹</th>`,\n    `<th>Notes (pcs)</th>`\n  ].join('');\n  const body = document.getElementById('docket-body');\n  // opening\n  const openTotals = state.opening;\n  // receipt totals\n  const recTotals = DENOMS.reduce((o, d) => { o[denomKey(d)] = 0; return o; }, {});\n  state.receipts.forEach(r => DENOMS.forEach(d => recTotals[denomKey(d)] += (r.denoms[denomKey(d)] || 0)));\n  // payment totals\n  const payTotals = DENOMS.reduce((o, d) => { o[denomKey(d)] = 0; return o; }, {});\n  state.payments.forEach(p => DENOMS.forEach(d => payTotals[denomKey(d)] += (p.denoms[denomKey(d)] || 0)));\n  // exchange net\n  const exchNet = DENOMS.reduce((o, d) => { o[denomKey(d)] = 0; return o; }, {});\n  state.exchanges.forEach(ex => DENOMS.forEach(d => {\n    const k = denomKey(d);\n    exchNet[k] += (ex.given[k] || 0) - (ex.received[k] || 0);\n  }));\n  // closing\n  const closeTotals = DENOMS.reduce((o, d) => {\n    const k = denomKey(d);\n    o[k] = (openTotals[k] || 0) + (recTotals[k] || 0) - (payTotals[k] || 0) + (exchNet[k] || 0);\n    return o;\n  }, {});\n\n  const row = (label, totals, cls) => `<tr class=\"${cls}\">\n    <td class=\"cell-label\">${label}</td>\n    ${DENOMS.map(d => `<td class=\"mono\">${totals[denomKey(d)] || '—'}</td>`).join('')}\n    <td class=\"mono\">₹${fmt(sumDenoms(totals))}</td>\n    <td class=\"mono\">${DENOMS.filter(d=>d.type==='note').reduce((s,d)=>s+(totals[denomKey(d)]||0),0)||'—'}</td>\n  </tr>`;\n  body.innerHTML = [\n    row('Opening', openTotals, 'r-open'),\n    row('+ Receipts', recTotals, 'r-rec'),\n    row('− Payments', payTotals, 'r-pay'),\n    ...(state.exchanges.length > 0 ? [row('↔ Exchange net', exchNet, '')] : []),\n    row('= Closing', closeTotals, 'r-close')\n  ].join('');\n\n  document.getElementById('doc-open').textContent = fmt(sumDenoms(openTotals));\n  document.getElementById('doc-rec').textContent = fmt(sumDenoms(recTotals));\n  document.getElementById('doc-pay').textContent = fmt(sumDenoms(payTotals));\n  document.getElementById('doc-close').textContent = fmt(sumDenoms(closeTotals));\n  document.getElementById('doc-words').textContent = numToWords(sumDenoms(closeTotals));\n  return closeTotals;\n}\n\n// ============ COH ============\nfunction buildCOH() {\n  const closing = buildDocket();\n  state._closing = closing;\n  // 🔄 AUTO-BUNDLE: Double Lock gets full bundles of 1000 pcs (notes only),\n  //                 Single Lock gets remainder + all coins.\n  //                 Runs on every COH refresh so it's fully automatic.\n  DENOMS.forEach(d => {\n    const k = denomKey(d);\n    const total = closing[k] || 0;\n    if (d.type === 'coin') {\n      state.coh.sl[k] = total; // all coins -> SL\n    } else {\n      const bundles = Math.floor(total / 1000);\n      const inDL = bundles * 1000;\n      state.coh.sl[k] = total - inDL; // SL = loose remainder\n    }\n  });\n  const body = document.getElementById('coh-body');\n  // Group: notes then coins\n  const notes = DENOMS.filter(d => d.type === 'note');\n  const coins = DENOMS.filter(d => d.type === 'coin');\n  const renderRow = (d) => {\n    const k = denomKey(d);\n    const total = closing[k] || 0;\n    const sl = state.coh.sl[k] || 0;\n    const dl = Math.max(0, total - sl);\n    const amt = total * d.val;\n    return `<tr data-k=\"${k}\">\n      <td class=\"coh-denom\"><span class=\"rup\">₹</span>${d.val}<span class=\"type-badge ${d.type==='note'?'d-type note':'d-type coin'}\">${d.type}</span></td>\n      <td class=\"c-total\">${total}</td>\n      <td class=\"c-sl\"><input type=\"number\" min=\"0\" max=\"${total}\" value=\"${sl||''}\" data-lock=\"sl\" placeholder=\"0\"></td>\n      <td class=\"c-dl\"><input type=\"number\" min=\"0\" max=\"${total}\" value=\"${dl||''}\" data-lock=\"dl\" placeholder=\"0\"></td>\n      <td class=\"c-amt\">₹${fmt(amt)}</td>\n    </tr>`;\n  };\n  body.innerHTML = [...notes, ...coins].map(renderRow).join('');\n  body.querySelectorAll('tr').forEach(tr => {\n    const k = tr.dataset.k;\n    const totalCell = tr.querySelector('.c-total');\n    const total = parseInt(totalCell.textContent) || 0;\n    const slInp = tr.querySelector('input[data-lock=\"sl\"]');\n    const dlInp = tr.querySelector('input[data-lock=\"dl\"]');\n    slInp.addEventListener('input', () => {\n      const sl = Math.min(total, Math.max(0, parseInt(slInp.value) || 0));\n      state.coh.sl[k] = sl;\n      const dl = Math.max(0, total - sl);\n      dlInp.value = dl || '';\n      updateCOHTotals();\n      saveState();\n    });\n    dlInp.addEventListener('input', () => {\n      const dl = Math.min(total, Math.max(0, parseInt(dlInp.value) || 0));\n      const sl = Math.max(0, total - dl);\n      state.coh.sl[k] = sl;\n      slInp.value = sl || '';\n      updateCOHTotals();\n      saveState();\n    });\n  });\n  updateCOHTotals();\n}\nfunction updateCOHTotals() {\n  const closing = state._closing || {};\n  let qTot = 0, slTot = 0, dlTot = 0, amtTot = 0;\n  DENOMS.forEach(d => {\n    const k = denomKey(d);\n    const t = closing[k] || 0;\n    const sl = state.coh.sl[k] || 0;\n    const dl = Math.max(0, t - sl);\n    qTot += t; slTot += sl; dlTot += dl; amtTot += t * d.val;\n  });\n  document.getElementById('coh-qty-total').textContent = qTot;\n  document.getElementById('coh-sl-total').textContent = slTot;\n  document.getElementById('coh-dl-total').textContent = dlTot;\n  document.getElementById('coh-amt-total').textContent = '₹' + fmt(amtTot);\n  const book = amtTot;\n  // Physical derived from qty (qty is fixed from book, so book === physical always in model)\n  const phy = slTot && dlTot ? DENOMS.reduce((s,d)=>s+((state.coh.sl[denomKey(d)]||0)+Math.max(0,(closing[denomKey(d)]||0)-(state.coh.sl[denomKey(d)]||0)))*d.val, 0) : amtTot;\n  document.getElementById('recon-book').textContent = fmt(book);\n  document.getElementById('recon-phy').textContent = fmt(phy);\n  const diff = phy - book;\n  document.getElementById('recon-diff').textContent = fmt(diff);\n  const card = document.getElementById('recon-diff-card');\n  card.className = Math.abs(diff) < 0.01 ? 'recon-card ok' : 'recon-card err';\n}\nfunction allToSingleLock() {\n  DENOMS.forEach(d => state.coh.sl[denomKey(d)] = (state._closing||{})[denomKey(d)] || 0);\n  buildCOH(); saveState();\n}\nfunction allToDoubleLock() {\n  DENOMS.forEach(d => state.coh.sl[denomKey(d)] = 0);\n  buildCOH(); saveState();\n}\n// Auto-bundling is now automatic inside buildCOH() — runs on every refresh.\n// Double Lock = full bundles of 1000 pcs (notes), Single Lock = remainder + all coins.\n\n// ============ DASHBOARD UPDATE ============\nfunction updateAll() {\n  const openSum = sumDenoms(state.opening);\n  const recSum = state.receipts.reduce((s, r) => s + (r.amount || 0), 0);\n  const paySum = state.payments.reduce((s, p) => s + (p.amount || 0), 0);\n  const exchSum = state.exchanges.reduce((s, ex) => s + sumDenoms(ex.given), 0);\n  const net = recSum - paySum;\n  const closing = openSum + net;\n  // Pcs\n  const closingTotals = DENOMS.reduce((o, d) => {\n    const k = denomKey(d);\n    const recT = state.receipts.reduce((s, r) => s + (r.denoms[k] || 0), 0);\n    const payT = state.payments.reduce((s, p) => s + (p.denoms[k] || 0), 0);\n    const exT = state.exchanges.reduce((s, ex) => s + ((ex.given[k]||0) - (ex.received[k]||0)), 0);\n    o[k] = (state.opening[k] || 0) + recT - payT + exT;\n    return o;\n  }, {});\n  const pcs = pcsDenoms(closingTotals);\n  document.getElementById('hero-cash').textContent = fmt(closing);\n  document.getElementById('hero-words').textContent = numToWords(closing);\n  document.getElementById('stat-rec-big').textContent = fmt(recSum);\n  document.getElementById('stat-pay-big').textContent = fmt(paySum);\n  document.getElementById('stat-rec-count').textContent = state.receipts.length;\n  document.getElementById('stat-pay-count').textContent = state.payments.length;\n  document.getElementById('stat-open').textContent = fmt(openSum);\n  document.getElementById('stat-open-mode').textContent = state.openingManual ? 'Manual entry' : 'Auto-carried forward';\n  document.getElementById('stat-net').textContent = fmt(net);\n  document.getElementById('stat-exch').textContent = fmt(exchSum);\n  document.getElementById('stat-exch-count').textContent = state.exchanges.length;\n  document.getElementById('stat-pcs').textContent = pcs;\n  document.getElementById('opening-total').textContent = fmt(openSum);\n  document.getElementById('opening-qty').textContent = pcsDenoms(state.opening);\n  document.getElementById('tab-rec-count').textContent = state.receipts.length;\n  document.getElementById('tab-pay-count').textContent = state.payments.length;\n  document.getElementById('tab-exch-count').textContent = state.exchanges.length;\n  // Refresh tabs if active\n  if (document.querySelector('#tab-docket.active')) buildDocket();\n  if (document.querySelector('#tab-coh.active')) buildCOH();\n}\n\n// ============ NOTES ============\nlet noteCtx = { editing: null, color: '' };\nfunction openNoteModal(id) {\n  noteCtx = { editing: id || null, color: '' };\n  const modal = document.getElementById('note-modal');\n  const textEl = document.getElementById('note-text');\n  const pinEl = document.getElementById('note-pinned');\n  const title = document.getElementById('note-modal-title');\n  if (id) {\n    const n = (state.notes || []).find(x => x.id === id);\n    if (n) {\n      textEl.value = n.text || '';\n      pinEl.checked = !!n.pinned;\n      noteCtx.color = n.color || '';\n      title.innerHTML = `📝 Edit Note <span class=\"pill dim\" style=\"margin-left:8px;\">${n.serial}</span>`;\n    }\n  } else {\n    textEl.value = '';\n    pinEl.checked = false;\n    title.textContent = '📝 New Note';\n  }\n  // Sync color picker\n  document.querySelectorAll('#note-color-picker .nc-chip').forEach(chip => {\n    chip.classList.toggle('active', (chip.dataset.color || '') === noteCtx.color);\n  });\n  modal.classList.add('active');\n  setTimeout(() => textEl.focus(), 100);\n}\nfunction closeNoteModal() { document.getElementById('note-modal').classList.remove('active'); }\n\n// Color picker wiring (once)\ndocument.querySelectorAll('#note-color-picker .nc-chip').forEach(chip => {\n  chip.addEventListener('click', () => {\n    noteCtx.color = chip.dataset.color || '';\n    document.querySelectorAll('#note-color-picker .nc-chip').forEach(c => {\n      c.classList.toggle('active', (c.dataset.color || '') === noteCtx.color);\n    });\n  });\n});\n\nfunction nextNoteSerial() {\n  const notes = state.notes || [];\n  let maxN = 0;\n  notes.forEach(n => {\n    const m = /^N(\\d+)$/.exec(n.serial || '');\n    if (m) maxN = Math.max(maxN, parseInt(m[1], 10));\n  });\n  return `N${maxN + 1}`;\n}\n\nfunction saveNote() {\n  const text = document.getElementById('note-text').value.trim();\n  if (!text) { alert('Note khali nahi ho sakta.'); return; }\n  const pinned = document.getElementById('note-pinned').checked;\n  state.notes = state.notes || [];\n  if (noteCtx.editing) {\n    const n = state.notes.find(x => x.id === noteCtx.editing);\n    if (n) {\n      n.text = text;\n      n.pinned = pinned;\n      n.color = noteCtx.color || '';\n      n.updatedAt = Date.now();\n    }\n  } else {\n    state.notes.push({\n      id: uid(),\n      serial: nextNoteSerial(),\n      text,\n      pinned,\n      color: noteCtx.color || '',\n      ts: Date.now()\n    });\n  }\n  closeNoteModal();\n  renderNotes();\n  saveState();\n  updateAll();\n}\n\nfunction deleteNote(id) {\n  if (!confirm('Delete this note?')) return;\n  state.notes = (state.notes || []).filter(n => n.id !== id);\n  renderNotes();\n  saveState();\n  updateAll();\n}\n\nfunction togglePinNote(id) {\n  const n = (state.notes || []).find(x => x.id === id);\n  if (!n) return;\n  n.pinned = !n.pinned;\n  renderNotes();\n  saveState();\n}\n\nfunction clearAllNotes() {\n  if (!(state.notes || []).length) return;\n  if (!confirm(`Delete all ${state.notes.length} notes?`)) return;\n  state.notes = [];\n  renderNotes();\n  saveState();\n  updateAll();\n}\n\nfunction renderNotes() {\n  const board = document.getElementById('notes-board');\n  if (!board) return;\n  const q = (document.getElementById('notes-search')?.value || '').toLowerCase().trim();\n  let notes = (state.notes || []).slice();\n  if (q) notes = notes.filter(n => (n.text || '').toLowerCase().includes(q) || (n.serial || '').toLowerCase().includes(q));\n  // Sort: pinned first, then by ts desc\n  notes.sort((a, b) => {\n    if (!!b.pinned - !!a.pinned !== 0) return (!!b.pinned) - (!!a.pinned);\n    return (b.ts || 0) - (a.ts || 0);\n  });\n\n  // Update counts\n  const total = (state.notes || []).length;\n  const tabBadge = document.getElementById('tab-notes-count');\n  if (tabBadge) tabBadge.textContent = total;\n  const pill = document.getElementById('notes-count-pill');\n  if (pill) pill.textContent = `${total} saved`;\n\n  if (!notes.length) {\n    board.innerHTML = q\n      ? `<div class=\"row-empty\"><div class=\"display\">No matches</div>Try a different search term</div>`\n      : `<div class=\"row-empty\"><div class=\"display\">No notes yet</div>Press <kbd class=\"kbd-inline\">N</kbd> or tap \"+ New Note\" to save a memo</div>`;\n    return;\n  }\n\n  const pad = n => String(n).padStart(2, '0');\n  const fmtTime = ts => {\n    const d = new Date(ts);\n    return `${pad(d.getHours())}:${pad(d.getMinutes())} · ${pad(d.getDate())}/${pad(d.getMonth()+1)}`;\n  };\n\n  board.innerHTML = notes.map(n => `\n    <div class=\"note-card ${n.color ? 'color-'+n.color : ''} ${n.pinned ? 'pinned' : ''}\" data-id=\"${n.id}\">\n      <div class=\"nc-hdr\">\n        <span class=\"nc-serial\">${n.serial || 'N?'}</span>\n        <span class=\"nc-time\">${fmtTime(n.ts)}${n.updatedAt ? ' ✎' : ''}</span>\n      </div>\n      <div class=\"nc-body ${n.text ? '' : 'empty'}\">${escapeHtml(n.text || '(empty)')}</div>\n      <div class=\"nc-actions\">\n        <button class=\"nc-ibtn\" onclick=\"togglePinNote('${n.id}')\" title=\"${n.pinned ? 'Unpin' : 'Pin'}\">${n.pinned ? '📌' : '📍'}</button>\n        <button class=\"nc-ibtn\" onclick=\"openNoteModal('${n.id}')\" title=\"Edit\">✎</button>\n        <button class=\"nc-ibtn danger\" onclick=\"deleteNote('${n.id}')\" title=\"Delete\">🗑</button>\n      </div>\n    </div>\n  `).join('');\n}\n\nfunction escapeHtml(s) {\n  return (s || '').replace(/[&<>\"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'})[c]);\n}\n\n// Search wiring\ndocument.addEventListener('DOMContentLoaded', () => {\n  const s = document.getElementById('notes-search');\n  if (s) s.addEventListener('input', renderNotes);\n});\n\n// ============ TABS ============\nfunction switchTab(name) {\n  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));\n  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-'+name));\n  if (name === 'receipts') buildTxnBody('rec');\n  if (name === 'payments') buildTxnBody('pay');\n  if (name === 'exchanges') buildExchBody();\n  if (name === 'docket') buildDocket();\n  if (name === 'coh') buildCOH();\n  if (name === 'history') refreshHistory();\n  if (name === 'notes') renderNotes();\n  localStorage.setItem('cdc_tab', name);\n}\ndocument.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));\n\n// ============ HISTORY ============\nfunction refreshHistory() {\n  const body = document.getElementById('history-body');\n  if (!state.history || state.history.length === 0) {\n    body.innerHTML = `<tr><td colspan=\"8\" class=\"row-empty\"><div class=\"display\">No history yet</div>Close a day to see it here</td></tr>`;\n    return;\n  }\n  body.innerHTML = state.history.slice().reverse().map((h, idx) => `\n    <tr>\n      <td class=\"cell-label\">${h.date}</td>\n      <td>${h.cashier || '—'}</td>\n      <td class=\"mono\">₹${fmt(h.openingTotal)}</td>\n      <td class=\"mono\" style=\"color:var(--pos);\">₹${fmt(h.receiptTotal)}</td>\n      <td class=\"mono\" style=\"color:var(--neg);\">₹${fmt(h.paymentTotal)}</td>\n      <td class=\"mono\" style=\"color:var(--accent); font-weight:700;\">₹${fmt(h.closingTotal)}</td>\n      <td class=\"mono\">${(h.receiptCount||0)+(h.paymentCount||0)+(h.exchangeCount||0)}</td>\n      <td class=\"no-print\"><button class=\"btn btn-sm btn-ghost\" onclick=\"deleteHistory(${state.history.length - 1 - idx})\">× Delete</button></td>\n    </tr>\n  `).join('');\n}\nfunction deleteHistory(idx) {\n  if (!confirm('Delete this docket from history?')) return;\n  state.history.splice(idx, 1);\n  refreshHistory();\n  saveState();\n}\n\nfunction closeDay() {\n  const openTotal = sumDenoms(state.opening);\n  const recTotal = state.receipts.reduce((s,r)=>s+(r.amount||0),0);\n  const payTotal = state.payments.reduce((s,p)=>s+(p.amount||0),0);\n  const closingTotals = DENOMS.reduce((o, d) => {\n    const k = denomKey(d);\n    const recT = state.receipts.reduce((s, r) => s + (r.denoms[k] || 0), 0);\n    const payT = state.payments.reduce((s, p) => s + (p.denoms[k] || 0), 0);\n    const exT = state.exchanges.reduce((s, ex) => s + ((ex.given[k]||0) - (ex.received[k]||0)), 0);\n    o[k] = (state.opening[k] || 0) + recT - payT + exT;\n    return o;\n  }, {});\n  const closingTotal = sumDenoms(closingTotals);\n  if (!confirm(`Close day ${state.date}?\\n\\nClosing Cash: ₹${fmt(closingTotal)}\\n\\nThis will become tomorrow's opening. All current entries will be archived.`)) return;\n  const snapshot = {\n    date: state.date,\n    cashier: getAuth()?.name || '',\n    branch: state.branch,\n    opening: { ...state.opening },\n    receipts: JSON.parse(JSON.stringify(state.receipts)),\n    payments: JSON.parse(JSON.stringify(state.payments)),\n    exchanges: JSON.parse(JSON.stringify(state.exchanges)),\n    closing: closingTotals,\n    openingTotal: openTotal,\n    receiptTotal: recTotal,\n    paymentTotal: payTotal,\n    closingTotal,\n    receiptCount: state.receipts.length,\n    paymentCount: state.payments.length,\n    exchangeCount: state.exchanges.length\n  };\n  state.history.push(snapshot);\n  // Start new day\n  state.date = todayISO();\n  state.opening = { ...closingTotals };\n  state.openingManual = false;\n  state.receipts = [];\n  state.payments = [];\n  state.exchanges = [];\n  state.coh = { sl: emptyDenoms() };\n  saveState();\n  document.getElementById('docketDate').value = state.date;\n  buildOpeningGrid();\n  buildTxnBody('rec');\n  buildTxnBody('pay');\n  buildExchBody();\n  updateAll();\n  document.getElementById('close-out').innerHTML = `<span class=\"big\">✓ Saved</span>Day ${snapshot.date} closed. Closing ₹${fmt(closingTotal)} carried forward.`;\n  alert('✓ Day closed and archived');\n}\n\n// ============ TOOLS ============\nfunction runCalc() {\n  const expr = document.getElementById('calc-expr').value;\n  const out = document.getElementById('calc-out');\n  if (!expr.trim()) { out.innerHTML = '<span class=\"big\">₹0.00</span>Result appears here'; return; }\n  try {\n    if (!/^[0-9+\\-*/().\\s]+$/.test(expr)) throw new Error('Invalid');\n    const r = Function(`\"use strict\"; return (${expr})`)();\n    out.innerHTML = `<span class=\"big\">₹${fmt(r)}</span>${numToWords(Math.floor(r))}`;\n  } catch (e) {\n    out.innerHTML = `<span class=\"big\">—</span>Invalid expression`;\n  }\n}\nfunction runBreakdown() {\n  const amt = parseFloat(document.getElementById('brk-amount').value) || 0;\n  const out = document.getElementById('brk-out');\n  if (amt <= 0) { out.textContent = 'Enter amount to see breakdown from available cash'; return; }\n  // Compute currently available cash on hand (closing)\n  const closing = DENOMS.reduce((o, d) => {\n    const k = denomKey(d);\n    const recT = state.receipts.reduce((s, r) => s + (r.denoms[k] || 0), 0);\n    const payT = state.payments.reduce((s, p) => s + (p.denoms[k] || 0), 0);\n    const exT = state.exchanges.reduce((s, ex) => s + ((ex.given[k]||0) - (ex.received[k]||0)), 0);\n    o[k] = Math.max(0, (state.opening[k] || 0) + recT - payT + exT);\n    return o;\n  }, {});\n  const avail = sumDenoms(closing);\n  if (amt > avail) {\n    out.innerHTML = `<span class=\"big\">⚠ Short by ₹${fmt(amt - avail)}</span>Available cash on hand: ₹${fmt(avail)}\\nCannot break down more than available.`;\n    return;\n  }\n  let rem = Math.floor(amt);\n  const parts = [];\n  for (const d of DENOMS) {\n    const k = denomKey(d);\n    const have = closing[k] || 0;\n    const need = Math.floor(rem / d.val);\n    const take = Math.min(have, need);\n    if (take > 0) { parts.push(`${take} × ₹${d.val} ${d.type}  (have ${have})`); rem -= take * d.val; }\n  }\n  if (rem > 0) {\n    out.innerHTML = `<span class=\"big\">⚠ Short by ₹${rem}</span>Best possible from available cash:\\n${parts.join('\\n')}\\n(Remainder ₹${rem} cannot be matched with current denominations)`;\n  } else {\n    out.innerHTML = `<span class=\"big\">₹${fmt(amt)}</span>${parts.join('\\n')}`;\n  }\n}\nfunction runSplit() {\n  const amt = parseFloat(document.getElementById('split-amt').value) || 0;\n  const n = parseInt(document.getElementById('split-n').value) || 1;\n  const each = amt / n;\n  document.getElementById('split-out').innerHTML = `<span class=\"big\">₹${fmt(each)}</span>per person × ${n}\\n= ₹${fmt(amt)} total`;\n}\nfunction runWords() {\n  const amt = parseFloat(document.getElementById('words-amt').value) || 0;\n  document.getElementById('words-out').innerHTML = `<span class=\"big\">₹${fmt(amt)}</span>${numToWords(amt)}`;\n}\n// Export\nfunction exportCSV() {\n  const rows = [];\n  rows.push(['CASH DESK CONSOLE — Daily Docket']);\n  rows.push(['Date', state.date, 'Cashier', getAuth()?.name || '', 'Branch', state.branch]);\n  rows.push([]);\n  rows.push(['=== OPENING ===']);\n  rows.push(['Denom', 'Qty', 'Amount']);\n  DENOMS.forEach(d => rows.push([`₹${d.val} ${d.type}`, state.opening[denomKey(d)]||0, (state.opening[denomKey(d)]||0)*d.val]));\n  rows.push([]);\n  rows.push(['=== RECEIPTS ===']);\n  rows.push(['Ref', 'Amount', ...DENOMS.map(d=>`${d.val}${d.type[0]}`)]);\n  state.receipts.forEach(r => rows.push([r.acno||'', r.amount, ...DENOMS.map(d=>r.denoms[denomKey(d)]||0)]));\n  rows.push([]);\n  rows.push(['=== PAYMENTS ===']);\n  rows.push(['Ref', 'Amount', ...DENOMS.map(d=>`${d.val}${d.type[0]}`)]);\n  state.payments.forEach(r => rows.push([r.acno||'', r.amount, ...DENOMS.map(d=>r.denoms[denomKey(d)]||0)]));\n  const csv = rows.map(r => r.map(c => `\"${String(c??'').replace(/\"/g,'\"\"')}\"`).join(',')).join('\\n');\n  downloadBlob(csv, `cash-desk-${state.date}.csv`, 'text/csv');\n}\nfunction exportJSON() {\n  downloadBlob(JSON.stringify(state, null, 2), `cash-desk-${state.date}.json`, 'application/json');\n}\nfunction backupAll() {\n  const full = { state, auth: getAuth(), tweaks: currentTweaks, exportedAt: new Date().toISOString() };\n  downloadBlob(JSON.stringify(full, null, 2), `cash-desk-backup-${todayISO()}.json`, 'application/json');\n  document.getElementById('backup-out').innerHTML = '<span class=\"big\">✓ Downloaded</span>All dockets + current day';\n}\nfunction restoreAll(ev) {\n  const f = ev.target.files[0]; if (!f) return;\n  const rd = new FileReader();\n  rd.onload = () => {\n    try {\n      const data = JSON.parse(rd.result);\n      if (!confirm('Overwrite current data with backup?')) return;\n      if (data.state) { state = data.state; saveState(); }\n      if (data.tweaks) { currentTweaks = data.tweaks; applyTweaks(currentTweaks); localStorage.setItem('cdc_tweaks', JSON.stringify(currentTweaks)); }\n      alert('Restored. Reloading…');\n      location.reload();\n    } catch (e) { alert('Invalid backup file'); }\n  };\n  rd.readAsText(f);\n}\nfunction wipeAll() {\n  if (!confirm('Wipe ALL data (current day + history + auth)? This cannot be undone.')) return;\n  if (!confirm('Are you sure?')) return;\n  localStorage.removeItem('cdc_state');\n  localStorage.removeItem(AUTH_KEY);\n  localStorage.removeItem('cdc_tweaks');\n  location.reload();\n}\nfunction downloadBlob(content, name, type) {\n  const blob = new Blob([content], { type });\n  const url = URL.createObjectURL(blob);\n  const a = document.createElement('a');\n  a.href = url; a.download = name; a.click();\n  URL.revokeObjectURL(url);\n}\n\n// ============ INIT ============\nfunction initApp() {\n  document.getElementById('docketDate').value = state.date;\n  document.getElementById('branchName').value = state.branch || 'Main Branch';\n  document.getElementById('docketDate').addEventListener('change', e => { state.date = e.target.value; saveState(); });\n  document.getElementById('branchName').addEventListener('input', e => { state.branch = e.target.value; saveState(); });\n  buildOpeningGrid();\n  buildTxnHeader('rec'); buildTxnBody('rec');\n  buildTxnHeader('pay'); buildTxnBody('pay');\n  buildExchHeader(); buildExchBody();\n  updateAll();\n  // Restore tab\n  const savedTab = localStorage.getItem('cdc_tab');\n  if (savedTab) switchTab(savedTab);\n}\n\n// Global keyboard shortcuts\ndocument.addEventListener('keydown', (e) => {\n  if (document.getElementById('main-app').classList.contains('locked')) return;\n  if (e.ctrlKey || e.metaKey || e.altKey) return;\n  const tag = (e.target.tagName || '').toLowerCase();\n  const isTyping = tag === 'input' || tag === 'textarea' || tag === 'select' || e.target.isContentEditable;\n\n  // Esc always works — close any active modal, Tweaks panel, or quick-add\n  if (e.key === 'Escape') {\n    // 1) Tweaks panel\n    const twPanel = document.getElementById('tw-panel');\n    if (twPanel && twPanel.classList.contains('open')) {\n      e.preventDefault();\n      twPanel.classList.remove('open');\n      return;\n    }\n    // 2) Any active modal\n    const active = document.querySelectorAll('.modal-bd.active');\n    if (active.length) {\n      e.preventDefault();\n      active.forEach(m => m.classList.remove('active'));\n      return;\n    }\n  }\n\n  // Enter in modal saves that modal\n  if (e.key === 'Enter') {\n    if (document.getElementById('search-modal').classList.contains('active')) {\n      e.preventDefault(); runSearch(); return;\n    }\n    if (document.getElementById('entry-modal').classList.contains('active')) {\n      e.preventDefault(); saveEntry(); return;\n    }\n    if (document.getElementById('exch-modal').classList.contains('active')) {\n      e.preventDefault(); saveExchange(); return;\n    }\n    if (document.getElementById('changepin-modal').classList.contains('active')) {\n      e.preventDefault(); doChangePin(); return;\n    }\n    if (document.getElementById('voucher-modal').classList.contains('active')) {\n      e.preventDefault(); closeVoucher(); return;\n    }\n  }\n\n  // Ctrl+K / Cmd+K — universal search from anywhere (even while typing)\n  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {\n    e.preventDefault();\n    if (document.querySelector('.modal-bd.active')) return;\n    openSearchModal();\n    return;\n  }\n\n  // Letter shortcuts — only when not typing and no modal is open\n  if (isTyping) return;\n  if (document.querySelector('.modal-bd.active')) return;\n  const key = e.key.toLowerCase();\n  if (key === 'r') { e.preventDefault(); openEntryModal('rec'); }\n  else if (key === 'p') { e.preventDefault(); openEntryModal('pay'); }\n  else if (key === 'e') { e.preventDefault(); openExchangeModal(); }\n  else if (key === 'a') { e.preventDefault(); switchTab('tools'); }\n  else if (key === 's') { e.preventDefault(); openSearchModal(); }\n  else if (key === 'n') { e.preventDefault(); openNoteModal(); }\n});\n\n// Start\ndocument.addEventListener('DOMContentLoaded', () => {\n  document.getElementById('auth-bd').style.display = 'flex';\n  showAuthScreen();\n  // Enter key submits\n  document.getElementById('login-pin').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });\n  document.getElementById('setup-pin2').addEventListener('keydown', e => { if (e.key === 'Enter') handleSetup(); });\n  // Live clock\n  const tickClock = () => {\n    const d = new Date();\n    const pad = n => String(n).padStart(2, '0');\n    const clk = document.getElementById('live-clock');\n    const dt = document.getElementById('live-date');\n    if (clk) clk.textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;\n    if (dt) {\n      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];\n      const mons = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\n      dt.textContent = `${days[d.getDay()]} ${pad(d.getDate())} ${mons[d.getMonth()]}`;\n    }\n  };\n  tickClock();\n  setInterval(tickClock, 1000);\n});\n// Fallback — DOMContentLoaded may already fire\nif (document.readyState !== 'loading') {\n  document.getElementById('auth-bd').style.display = 'flex';\n  showAuthScreen();\n}\n<\/script>\n\n\n</body></html>"
