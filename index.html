  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

e: Ocean — cool blues on dark navy */\n:root[data-theme=\"ocean\"] {\n  --bg: #0a1929;\n  --bg-elev: #122338;\n  --panel: #17304a;\n  --panel-hi: #1f3d5c;\n  --border: #264766;\n  --border-strong: #3d5f80;\n  --text: #e8f1fb;\n  --text-dim: #9bb3cc;\n  --muted: #6a829c;\n  --accent: #38bdf8;\n  --accent-ink: #032029;\n  --pos: #34d399;\n  --pos-soft: rgba(52, 211, 153, 0.12);\n  --neg: #fb7185;\n  --neg-soft: rgba(251, 113, 133, 0.12);\n  --info: #60a5fa;\n  --info-soft: rgba(96, 165, 250, 0.14);\n  --warn: #fbbf24;\n  --warn-soft: rgba(251, 191, 36, 0.14);\n  --shadow: 0 8px 28px rgba(0, 0, 0, 0.35);\n  --glow: 0 0 0 3px rgba(56, 189, 248, 0.26);\n}\n\n/* Modern theme: Forest — warm greens on deep charcoal */\n:root[data-theme=\"forest\"] {\n  --bg: #0f1511;\n  --bg-elev: #18201b;\n  --panel: #1f2923;\n  --panel-hi: #2a3630;\n  --border: #2f3d34;\n  --border-strong: #4a5e50;\n  --text: #eaf1ec;\n  --text-dim: #a8bdaf;\n  --muted: #76897d;\n  --accent: #4ade80;\n  --accent-ink: #062010;\n  --pos: #86efac;\n  --pos-soft: rgba(134, 239, 172, 0.14);\n  --neg: #fca5a5;\n  --neg-soft: rgba(252, 165, 165, 0.14);\n  --info: #7dd3fc;\n  --info-soft: rgba(125, 211, 252, 0.14);\n  --warn: #fde047;\n  --warn-soft: rgba(253, 224, 71, 0.14);\n  --shadow: 0 8px 28px rgba(0, 0, 0, 0.4);\n  --glow: 0 0 0 3px rgba(74, 222, 128, 0.25);\n}\n\n/* Modern theme: Lavender — soft violet on off-white */\n:root[data-theme=\"lavender\"] {\n  --bg: #f8f6fc;\n  --bg-elev: #ffffff;\n  --panel: #ffffff;\n  --panel-hi: #efeaf8;\n  --border: #e0d8f0;\n  --border-strong: #b8a9de;\n  --text: #1f1530;\n  --text-dim: #5b4d78;\n  --muted: #8d7dab;\n  --accent: #7c3aed;\n  --accent-ink: #ffffff;\n  --pos: #059669;\n  --pos-soft: #d9f1e6;\n  --neg: #be123c;\n  --neg-soft: #f4d9e1;\n  --info: #4338ca;\n  --info-soft: #e0deff;\n  --warn: #b45309;\n  --warn-soft: #f6e6cf;\n  --shadow: 0 6px 24px rgba(124, 58, 237, 0.1);\n  --glow: 0 0 0 3px rgba(124, 58, 237, 0.22);\n}\n\n/* Modern theme: Crimson — vibrant red on cream */\n:root[data-theme=\"crimson\"] {\n  --bg: #fbf7f5;\n  --bg-elev: #ffffff;\n  --panel: #ffffff;\n  --panel-hi: #fbe8e3;\n  --border: #f0d8d0;\n  --border-strong: #d39786;\n  --text: #27120c;\n  --text-dim: #6b3d30;\n  --muted: #a07565;\n  --accent: #dc2626;\n  --accent-ink: #ffffff;\n  --pos: #047857;\n  --pos-soft: #d4efe4;\n  --neg: #b91c1c;\n  --neg-soft: #fad7d4;\n  --info: #1d4ed8;\n  --info-soft: #d9e2f9;\n  --warn: #a16207;\n  --warn-soft: #f3e3cd;\n  --shadow: 0 6px 22px rgba(220, 38, 38, 0.1);\n  --glow: 0 0 0 3px rgba(220, 38, 38, 0.22);\n}\n\n/* Modern theme: Graphite — sleek dark slate with cyan accent */\n:root[data-theme=\"graphite\"] {\n  --bg: #111418;\n  --bg-elev: #181c22;\n  --panel: #1d232b;\n  --panel-hi: #262d36;\n  --border: #2a323d;\n  --border-strong: #4a525e;\n  --text: #eef0f4;\n  --text-dim: #aab0bc;\n  --muted: #6b7380;\n  --accent: #22d3ee;\n  --accent-ink: #02161b;\n  --pos: #4ade80;\n  --pos-soft: rgba(74, 222, 128, 0.14);\n  --neg: #f87171;\n  --neg-soft: rgba(248, 113, 113, 0.14);\n  --info: #818cf8;\n  --info-soft: rgba(129, 140, 248, 0.14);\n  --warn: #facc15;\n  --warn-soft: rgba(250, 204, 21, 0.14);\n  --shadow: 0 8px 28px rgba(0, 0, 0, 0.45);\n  --glow: 0 0 0 3px rgba(34, 211, 238, 0.26);\n}\n\n/* Custom accent override — applied when user picks a custom color */\n:root[data-accent-override=\"1\"] {\n  --accent: var(--custom-accent, var(--accent));\n  --glow: 0 0 0 3px var(--custom-accent-glow, rgba(0,0,0,0.12));\n}\n\n/* Font tokens */\n:root[data-font=\"grotesk\"] {\n  --font-sans: 'Space Grotesk', system-ui, sans-serif;\n  --font-display: 'Instrument Serif', Georgia, serif;\n  --font-mono: 'JetBrains Mono', monospace;\n}\n:root[data-font=\"manrope\"] {\n  --font-sans: 'Manrope', system-ui, sans-serif;\n  --font-display: 'Fraunces', Georgia, serif;\n  --font-mono: 'IBM Plex Mono', monospace;\n}\n:root[data-font=\"mono\"] {\n  --font-sans: 'IBM Plex Mono', monospace;\n  --font-display: 'IBM Plex Mono', monospace;\n  --font-mono: 'IBM Plex Mono', monospace;\n}\n\n/* Density */\n:root[data-density=\"cozy\"] { --gap: 16px; --pad: 20px; --row-h: 42px; }\n:root[data-density=\"compact\"] { --gap: 10px; --pad: 14px; --row-h: 34px; }\n\n* { box-sizing: border-box; margin: 0; padding: 0; }\nhtml, body {\n  min-height: 100%;\n  font-family: var(--font-sans);\n  background: var(--bg);\n  color: var(--text);\n  font-size: 14px;\n  line-height: 1.5;\n  -webkit-font-smoothing: antialiased;\n  transition: background 0.2s, color 0.2s;\n}\n.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }\n.display { font-family: var(--font-display); font-weight: 400; letter-spacing: -0.015em; }\n\n.app { max-width: 1440px; margin: 0 auto; padding: var(--pad); }\n\n/* ============ HEADER ============ */\nheader {\n  background: var(--panel);\n  border: 1px solid var(--border);\n  border-radius: 20px;\n  padding: 22px 26px;\n  margin-bottom: var(--gap);\n  display: grid;\n  grid-template-columns: auto 1fr auto;\n  gap: 24px;\n  align-items: center;\n  position: relative;\n  overflow: hidden;\n}\nheader::before {\n  content: \"\";\n  position: absolute;\n  top: 0; left: 0; right: 0; height: 3px;\n  background: linear-gradient(90deg, var(--accent), transparent 60%);\n}\n.logo-mark {\n  width: 56px; height: 56px;\n  background: var(--accent);\n  color: var(--accent-ink);\n  border-radius: 14px;\n  display: flex; align-items: center; justify-content: center;\n  font-family: var(--font-display);\n  font-size: 34px;\n  font-weight: 600;\n  line-height: 1;\n  letter-spacing: -0.04em;\n}\n.brand h1 {\n  font-family: var(--font-display);\n  font-size: 32px;\n  line-height: 1;\n  letter-spacing: -0.02em;\n  margin-bottom: 6px;\n}\n.brand .sub {\n  font-size: 12px;\n  color: var(--text-dim);\n  letter-spacing: 0.02em;\n  display: flex;\n  gap: 12px;\n  align-items: center;\n  flex-wrap: wrap;\n}\n.brand .sub .dot { color: var(--border-strong); }\n.brand .sub strong { color: var(--text); font-weight: 600; }\n.hdr-right {\n  display: flex;\n  gap: 8px;\n  align-items: center;\n  flex-wrap: wrap;\n  justify-content: flex-end;\n}\n.hdr-pill {\n  background: var(--panel-hi);\n  border: 1px solid var(--border);\n  border-radius: 10px;\n  padding: 8px 14px;\n  font-size: 12px;\n  display: flex;\n  flex-direction: column;\n  gap: 2px;\n}\n.hdr-pill .k {\n  font-size: 9px;\n  text-transform: uppercase;\n  letter-spacing: 0.12em;\n  color: var(--muted);\n  font-weight: 600;\n}\n.hdr-pill .v {\n  font-family: var(--font-mono);\n  font-weight: 600;\n  font-size: 13px;\n  color: var(--text);\n}\n.hdr-pill input {\n  background: transparent;\n  border: none;\n  color: var(--text);\n  font: inherit;\n  font-family: var(--font-mono);\n  font-weight: 600;\n  font-size: 13px;\n  padding: 0;\n  width: 120px;\n}\n.hdr-pill input:focus { outline: none; }\n\n.session-chip {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  padding: 6px 10px;\n  background: var(--pos-soft);\n  color: var(--pos);\n  border-radius: 20px;\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: 0.04em;\n}\n.session-chip .pulse {\n  width: 6px; height: 6px; border-radius: 50%;\n  background: currentColor;\n  animation: pulse 2s infinite;\n}\n@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }\n\n.clock-chip {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  padding: 6px 10px;\n  background: var(--panel-hi);\n  color: var(--text);\n  border: 1px solid var(--border);\n  border-radius: 20px;\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: 0.04em;\n}\n.clock-chip .dim { color: var(--muted); font-weight: 500; }\n\n.app-footer {\n  grid-column: 1 / -1;\n  margin-top: 20px;\n  padding: 14px 20px;\n  background: var(--panel);\n  border: 1px solid var(--border);\n  border-radius: 14px;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 16px;\n  flex-wrap: wrap;\n  font-size: 12px;\n  color: var(--muted);\n  letter-spacing: 0.02em;\n}\n.app-footer .foot-left,\n.app-footer .foot-right {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  flex-wrap: wrap;\n}\n.app-footer strong { color: var(--text); font-weight: 700; letter-spacing: 0.04em; }\n.app-footer .mono { color: var(--text); }\n.app-footer .dot { opacity: 0.5; }\n@media (max-width: 760px) {\n  .app-footer { justify-content: center; text-align: center; }\n}\n\n.icon-btn {\n  width: 36px; height: 36px;\n  border-radius: 10px;\n  border: 1px solid var(--border);\n  background: var(--panel-hi);\n  color: var(--text);\n  cursor: pointer;\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  transition: all 0.15s;\n}\n.icon-btn:hover { border-color: var(--accent); color: var(--accent); }\n.icon-btn svg { width: 18px; height: 18px; }\n\n/* ============ TABS ============ */\n.tabs {\n  display: flex;\n  gap: 4px;\n  margin-bottom: var(--gap);\n  padding: 5px;\n  background: var(--panel);\n  border: 1px solid var(--border);\n  border-radius: 14px;\n  overflow-x: auto;\n}\n.tab-btn {\n  padding: 10px 16px;\n  background: transparent;\n  border: none;\n  border-radius: 9px;\n  cursor: pointer;\n  font: inherit;\n  font-weight: 600;\n  font-size: 13px;\n  color: var(--text-dim);\n  transition: all 0.15s;\n  white-space: nowrap;\n  display: flex;\n  align-items: center;\n  gap: 7px;\n  letter-spacing: 0.01em;\n}\n.tab-btn:hover { background: var(--panel-hi); color: var(--text); }\n.tab-btn.active {\n  background: var(--accent);\n  color: var(--accent-ink);\n}\n.tab-btn .badge {\n  background: rgba(0,0,0,0.15);\n  padding: 1px 7px;\n  border-radius: 10px;\n  font-size: 10px;\n  font-weight: 700;\n  font-family: var(--font-mono);\n}\n.tab-btn:not(.active) .badge { background: var(--panel-hi); border: 1px solid var(--border); }\n\n.tab-content { display: none; animation: fadeIn 0.2s ease; }\n.tab-content.active { display: block; }\n@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to form-row input.num {\n  font-family: var(--font-mono);\n  font-weight: 600;\n  font-size: 18px;\n}\n.form-row input:focus, .form-row select:focus {\n  outline: none;\n  border-color: var(--accent);\n  box-shadow: var(--glow);\n  background: var(--panel);\n}\n\n.modal-denom {\n  background: var(--panel);\n  border: 1px solid var(--border);\n  border-radius: 12px;\n  padding: 16px;\n  margin-top: 10px;\n}\n.modal-denom .panel-title { margin-bottom: 12px; }\n\n.exch-cols {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 14px;\n  margin-top: 10px;\n}\n@media (max-width: 700px) { .exch-cols { grid-template-columns: 1fr; } }\n.exch-col {\n  border: 1px solid var(--border);\n  border-radius: 14px;\n  padding: 16px;\n  background: var(--panel);\n  position: relative;\n}\n.exch-col.given { border-color: var(--pos); }\n.exch-col.given::before { background: var(--pos); }\n.exch-col.recvd { border-color: var(--neg); }\n.exch-col.recvd::before { background: var(--neg); }\n.exch-col::before {\n  content: \"\";\n  position: absolute;\n  top: 0; left: 0; right: 0;\n  height: 3px;\n  border-radius: 14px 14px 0 0;\n}\n.exch-col h4 {\n  font-family: var(--font-display);\n  font-size: 20px;\n  letter-spacing: -0.01em;\n  display: flex;\n  justify-content: space-between;\n  align-items: baseline;\n  margin-bottom: 14px;\n}\n.exch-col h4 .sum {\n  font-family: var(--font-mono);\n  font-size: 16px;\n  font-weight: 700;\n}\n.exch-col.given h4 .sum { color: var(--pos); }\n.exch-col.recvd h4 .sum { color: var(--neg); }\n.exch-col .denom-grid { gap: 6px; }\n.exch-col .denom-cell { padding: 6px 8px; }\n.exch-col .denom-cell input { font-size: clamp(14px, 1.4vw, 18px); }\n\n.exch-balance {\n  margin-top: 14px;\n  padding: 12px 16px;\n  border-radius: 12px;\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  font-family: var(--font-mono);\n  font-weight: 700;\n  font-size: 14px;\n}\n.exch-balance.ok { background: var(--pos-soft); color: var(--pos); }\n.exch-balance.err { background: var(--neg-soft); color: var(--neg); }\n.exch-balance.empty { background: var(--panel-hi); color: var(--muted); }\n\n/* ============ CASH ON HAND (split) ============ */\n.coh-tbl thead th { background: var(--panel-hi); }\n.coh-tbl tbody td.coh-denom {\n  padding: 10px 14px;\n  text-align: left;\n  background: var(--panel-hi);\n  font-family: var(--font-mono);\n  font-weight: 600;\n}\n.coh-tbl tbody td.coh-denom .rup { color: var(--muted); margin-right: 3px; }\n.coh-tbl tbody td.coh-denom .type-badge {\n  margin-left: 8px;\n  font-size: 9px;\n  text-transform: uppercase;\n  letter-spacing: 0.1em;\n  padding: 1px 6px;\n  border-radius: 4px;\n  font-weight: 700;\n  font-family: var(--font-sans);\n}\n.coh-tbl input {\n  width: 100%;\n  padding: 10px 8px;\n  font-size: 16px;\n  font-family: var(--font-mono);\n  font-weight: 700;\n  text-align: center;\n  border: none;\n  background: transparent;\n  color: var(--text);\n}\n.coh-tbl input:focus {\n  outline: 2px solid var(--accent);\n  background: var(--panel-hi);\n  border-radius: 4px;\n}\n.coh-tbl td.c-sl { background: color-mix(in srgb, var(--warn-soft), transparent 50%); }\n.coh-tbl td.c-dl { background: color-mix(in srgb, var(--info-soft), transparent 50%); }\n.coh-tbl td.c-total { background: var(--panel-hi); font-family: var(--font-mono); font-weight: 700; color: var(--text-dim); }\n.coh-tbl td.c-amt { background: var(--panel-hi); font-family: var(--font-mono); font-weight: 700; color: var(--accent); }\n.coh-tbl tfoot td {\n  font-size: 14px;\n  padding: 14px 10px;\n  background: var(--accent);\n  color: var(--accent-ink);\n  border: none;\n}\n\n.lock-badge {\n  display: inline-flex;\n  align-items: center;\n  gap: 5px;\n  padding: 3px 10px;\n  border-radius: 12px;\n  font-size: 10px;\n  font-weight: 700;\n  text-transform: uppercase;\n  letter-spacing: 0.1em;\n  font-family: var(--font-sans);\n}\n.lock-badge.sl { background: var(--warn-soft); color: var(--warn); }\n.lock-badge.dl { background: var(--info-soft); color: var(--info); }\n\n.recon-grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));\n  gap: 10px;\n  margin-top: 14px;\n}\n.recon-card {\n  padding: 16px 18px;\n  border: 1px solid var(--border);\n  border-radius: 12px;\n  position: relative;\n}\n.recon-card .label {\n  font-size: 10px;\n  text-transform: uppercase;\n  letter-spacing: 0.14em;\n  font-weight: 700;\n  color: var(--muted);\n  margin-bottom: 8px;\n}\n.recon-card .val {\n  font-family: var(--font-display);\n  font-size: 28px;\n  letter-spacing: -0.02em;\n  font-variant-numeric: tabular-nums;\n}\n.recon-card.ok { border-color: var(--pos); background: var(--pos-soft); }\n.recon-card.ok .val { color: var(--pos); }\n.recon-card.err { border-color: var(--neg); background: var(--neg-soft); }\n.recon-card.err .val { color: var(--neg); }\n.recon-card.info .val { color: var(--info); }\n.recon-card.warn .val { color: var(--warn); }\n\n/* ============ TOOLS TAB ============ */\n.tools-grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));\n  gap: var(--gap);\n}\n.tool-card {\n  background: var(--panel);\n  border: 1px solid var(--border);\n  border-radius: 16px;\n  padding: 20px 22px;\n}\n.tool-card h4 {\n  font-family: var(--font-display);\n  font-size: 22px;\n  letter-spacing: -0.01em;\n  margin-bottom: 4px;\n}\n.tool-card .tool-desc {\n  font-size: 12px;\n  color: var(--muted);\n  margin-bottom: 16px;\n}\n.tool-card .tool-body { display: flex; flex-direction: column; gap: 10px; }\n.tool-card input, .tool-card select {\n  padding: 10px 12px;\n  background: var(--panel-hi);\n  border: 1px solid var(--border);\n  border-radius: 10px;\n  font: inherit;\n  color: var(--text);\n  font-family: var(--font-mono);\n  font-size: 15px;\n}\n.tool-card input:focus { outline: none; border-color: var(--accent); box-shadow: var(--glow); }\n.tool-out {\n  padding: 14px;\n  background: var(--panel-hi);\n  border-radius: 10px;\n  min-height: 80px;\n  font-family: var(--font-mono);\n  font-size: 13px;\n  white-space: pre-wrap;\n  color: var(--text-dim);\n  border-left: 3px solid var(--accent);\n}\n.tool-out .big {\n  font-family: var(--font-display);\n  font-size: 28px;\n  color: var(--text);\n  letter-spacing: -0.02em;\n  display: block;\n  margin-bottom: 4px;\n}\n\n/* ============ AUTH OVERLAY ============ */\n.auth-bd {\n  position: fixed;\n  inset: 0;\n  background: var(--bg);\n  z-index: 1000;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  padding: 20px;\n  overflow-y: auto;\n}\n.auth-bd::before {\n  content: \"\";\n  position: absolute;\n  inset: 0;\n  background:\n    radial-gradient(circle at 10% 20%, var(--warn-soft) 0%, transparent 40%),\n    radial-gradient(circle at 90% 80%, var(--info-soft) 0%, transparent 40%);\n  opacity: 0.6;\n  pointer-events: none;\n}\n.auth-card {\n  background: var(--panel);\n  border: 1px solid var(--border);\n  border-radius: 24px;\n  padding: 36px 38px;\n  width: 100%;\n  max-width: 420px;\n  box-shadow: var(--shadow);\n  position: relative;\n  z-index: 1;\n  animation: modalIn 0.35s cubic-bezier(0.16,1,0.3,1);\n}\n.auth-top { text-align: center; margin-bottom: 28px; }\n.auth-logo {\n  width: 72px; height: 72px;\n  margin: 0 auto 16px;\n  background: var(--accent);\n  color: var(--accent-ink);\n  border-radius: 18px;\n  display: flex; align-items: center; justify-content: center;\n  font-family: var(--font-display);\n  font-size: 42px;\n  font-weight: 600;\n  line-height: 1;\n}\n.auth-top h2 {\n  font-family: var(--font-display);\n  font-size: 32px;\n  letter-spacing: -0.02em;\n  margin-bottom: 6px;\n}\n.auth-top .sub {\n  font-size: 13px;\n  color: var(--muted);\n  line-height: 1.5;\n}\n.auth-form { display: flex; flex-direction: column; gap: 14px; }\n.auth-form .field { display: flex; flex-direction: column; gap: 6px; }\n.auth-form label {\n  font-size: 10px;\n  text-transform: uppercase;\n  letter-spacing: 0.14em;\n  color: var(--muted);\n  font-weight: 700;\n}\n.auth-form input[type=\"text\"], .auth-form input[type=\"password\"] {\n  padding: 12px 14px;\n  background: var(--panel-hi);\n  border: 1px solid var(--border);\n  border-radius: 10px;\n  font: inherit;\n  font-size: 15px;\n  color: var(--text);\n}\n.auth-form input:focus { outline: none; border-color: var(--accent); box-shadow: var(--glow); background: var(--panel); }\n.pin-input {\n  letter-spacing: 0.6em !important;\n  font-family: var(--font-mono) !important;\n  font-weight: 700;\n  font-size: 22px !important;\n  text-align: center;\n  padding-left: 22px !important;\n}\n.auth-btn {\n  padding: 13px 16px;\n  background: var(--accent);\n  color: var(--accent-ink);\n  border: none;\n  border-radius: 10px;\n  font: inherit;\n  font-weight: 700;\n  font-size: 14px;\n  cursor: pointer;\n  transition: all 0.15s;\n  margin-top: 6px;\n  letter-spacing: 0.04em;\n  text-transform: uppercase;\n}\n.auth-btn:hover { filter: brightness(0.95); transform: translateY(-1px); }\n.auth-btn.secondary {\n  background: transparent;\n  color: var(--text-dim);\n  border: 1px solid var(--border);\n}\n.auth-btn.secondary:hover { border-color: var(--accent); color: var(--accent); }\n.auth-err {\n  padding: 10px 12px;\n  background: var(--neg-soft);\n  color: var(--neg);\n  border-radius: 8px;\n  font-size: 12px;\n  font-weight: 600;\n  text-align: center;\n  display: none;\n}\n.auth-err.show { display: block; animation: shake 0.4s; }\n@keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }\n.auth-hint {\n  font-size: 11px;\n  color: var(--muted);\n  text-align: center;\n  margin-top: 10px;\n  line-height: 1.5;\n}\n.auth-hint a {\n  color: var(--accent);\n  text-decoration: none;\n  font-weight: 700;\n  cursor: pointer;\n}\n.auth-hint a:hover { text-decoration: underline; }\n.auth-foot {\n  text-align: center;\n  margin-top: 24px;\n  padding-top: 18px;\n  border-top: 1px solid var(--border);\n  font-size: 10px;\n  color: var(--muted);\n  line-height: 1.6;\n  letter-spacing: 0.05em;\n}\n\n/* ============ TWEAKS PANEL ============ */\n.tw-toggle-btn {\n  position: fixed;\n  bottom: 20px; right: 20px;\n  width: 48px; height: 48px;\n  border-radius: 50%;\n  background: var(--accent);\n  color: var(--accent-ink);\n  border: none;\n  cursor: pointer;\n  box-shadow: var(--shadow);\n  z-index: 90;\n  display: none;\n  align-items: center;\n  justify-content: center;\n  font-size: 22px;\n  transition: transform 0.2s;\n}\n.tw-toggle-btn:hover { transform: rotate(90deg); }\n.tw-toggle-btn.visible { display: flex; }\n.tw-panel {\n  position: fixed;\n  bottom: 80px; right: 20px;\n  width: 300px;\n  background: var(--bg-elev);\n  border: 1px solid var(--border);\n  border-radius: 16px;\n  padding: 18px;\n  box-shadow: var(--shadow);\n  z-index: 91;\n  display: none;\n}\n.tw-panel.open { display: block; animation: modalIn 0.2s; }\n.tw-panel h4 {\n  font-family: var(--font-display);\n  font-size: 20px;\n  letter-spacing: -0.01em;\n  margin-bottom: 14px;\n  display: flex; justify-content: space-between; align-items: center;\n}\n.tw-panel .tw-close {\n  background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 22px; line-height: 1;\n}\n.tw-group { margin-bottom: 14px; }\n.tw-group label {\n  font-size: 10px;\n  text-transform: uppercase;\n  letter-spacing: 0.12em;\n  color: var(--muted);\n  font-weight: 700;\n  margin-bottom: 6px;\n  display: block;\n}\n.tw-options { display: flex; gap: 6px; flex-wrap: wrap; }\n.tw-opt {\n  flex: 1;\n  min-width: 80px;\n  padding: 8px 10px;\n  background: var(--panel);\n  border: 1px solid var(--border);\n  border-radius: 8px;\n  cursor: pointer;\n  font: inherit;\n  font-size: 12px;\n  font-weight: 600;\n  color: var(--text-dim);\n  text-align: center;\n  transition: all 0.15s;\n}\n.tw-opt.active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }\n.tw-opt:hover:not(.active) { border-color: var(--accent); color: var(--text); }\n\n/* Accent color picker */\n.tw-accent-row {\n  display: flex; flex-direction: column; gap: 8px;\n}\n.tw-accent-swatches {\n  display: grid;\n  grid-template-columns: repeat(10, 1fr);\n  gap: 5px;\n}\n.tw-accent-sw {\n  width: 100%;\n  aspect-ratio: 1;\n  border-radius: 50%;\n  border: 2px solid var(--border);\n  cursor: pointer;\n  padding: 0;\n  transition: transform 0.12s, border-color 0.12s;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  background: var(--panel-hi);\n}\n.tw-accent-sw:hover { transform: scale(1.15); }\n.tw-accent-sw.active { border-color: var(--text); box-shadow: 0 0 0 2px var(--accent); }\n.tw-accent-sw .accent-x { font-size: 10px; color: var(--muted); }\n.tw-accent-custom {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  padding: 6px 10px;\n  border: 1px dashed var(--border);\n  border-radius: 8px;\n  cursor: pointer;\n  font-size: 11px;\n  color: var(--text-dim);\n}\n.tw-accent-custom input[type=\"color\"] {\n  width: 28px;\n  height: 28px;\n  border: none;\n  padding: 0;\n  background: transparent;\n  cursor: pointer;\n  border-radius: 6px;\n}\n.tw-themes { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }\n.tw-themes .tw-opt { min-width: 0; flex: initial; }\n.tw-themes .tw-swatch { font-size: 10px; }\n\n.tw-swatch {\n  display: flex; flex-direction: column; align-items: center; gap: 4px;\n  padding: 8px 6px;\n}\n.tw-swatch .sw-dots {\n  display: flex; gap: 3px;\n}\n.tw-swatch .sw-dots span {\n  width: 14px; height: 14px; border-radius: 50%;\n  border: 1px solid rgba(0,0,0,0.08);\n}\n\n/* ============ MISC ============ */\n.hidden { display: none !important; }\n.flex-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }\n.app.locked { display: none; }\n\n.hint-note {\n  padding: 10px 14px;\n  background: var(--info-soft);\n  color: var(--info);\n  border-left: 3px solid var(--info);\n  border-radius: 8px;\n  font-size: 12px;\n  margin-bottom: 12px;\n  line-height: 1.5;\n}\n.hint-note strong { font-weight: 700; }\n\n/* ============ PRINT ============ */\n@media print {\n  body { background: white; color: black; }\n  .app { padding: 0; max-width: none; }\n  .no-print, .tabs, .modal-bd, .tw-toggle-btn, .tw-panel, .auth-bd, .qa-grid { display: none !important; }\n  header { background: white !important; color: black !important; border: 1px solid #ccc; }\n  .panel, .hero-main, .hero-stat, .stat-cell { box-shadow: none !important; border: 1px solid #ddd; break-inside: avoid; }\n  .tab-content { display: block !important; page-break-before: auto; }\n  .tab-content:not(:first-of-type) { page-break-before: always; }\n  table { min-width: unset; font-size: 10px; }\n  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }\n}\n</style>\n</head>\n<body>\n\n<!-- Splash thumbnail shown while the standalone bundle unpacks / JS-disabled fallback -->\n\n\n<!-- ============ AUTH ============ -->\n<div class=\"auth-bd\" id=\"auth-bd\">\n  <div class=\"auth-card\">\n    <div class=\"auth-top\">\n      <div class=\"auth-logo\">₹</div>\n      <h2>Cash Desk Console</h2>\n      <div class=\"sub\">Secure PIN access · आपकी PIN safely this device पर save होगी</div>\n    </div>\n\n    <div class=\"auth-form\" id=\"setup-form\" style=\"display:none;\">\n      <div class=\"field\">\n        <label>Your Name</label>\n        <input type=\"text\" id=\"setup-name\" placeholder=\"Cashier / Staff name\">\n      </div>\n      <div class=\"field\">\n        <label>Create 4-Digit PIN</label>\n        <input type=\"password\" id=\"setup-pin1\" class=\"pin-input\" maxlength=\"4\" inputmode=\"numeric\" placeholder=\"••••\">\n      </div>\n      <div class=\"field\">\n        <label>Confirm PIN</label>\n        <input type=\"password\" id=\"setup-pin2\" class=\"pin-input\" maxlength=\"4\" inputmode=\"numeric\" placeholder=\"••••\">\n      </div>\n      <div class=\"auth-err\" id=\"setup-err\"></div>\n      <button class=\"auth-btn\" onclick=\"handleSetup()\">Create PIN &amp; Continue</button>\n    </div>\n\n    <div class=\"auth-form\" id=\"login-form\" style=\"display:none;\">\n      <div style=\"text-align:center; font-size:14px; color:var(--text-dim); font-weight:500;\">\n        Welcome back, <strong style=\"color:var(--text);\" id=\"login-who\">—</strong>\n      </div>\n      <div class=\"field\">\n        <label style=\"text-align:center;\">Enter 4-Digit PIN</label>\n        <input type=\"password\" id=\"login-pin\" class=\"pin-input\" maxlength=\"4\" inputmode=\"numeric\" placeholder=\"••••\">\n      </div>\n      <div class=\"auth-err\" id=\"login-err\"></div>\n      <button class=\"auth-btn\" onclick=\"handleLogin()\">Unlock</button>\n      <div class=\"auth-hint\">PIN भूल गए? <a onclick=\"resetPin()\">Reset</a></div>\n    </div>\n\n    <div class=\"auth-foot\">\n      CASH DESK CONSOLE · v1.0 · Local device only<br>\n      No data leaves your browser<br>\n      <span style=\"opacity:0.75; display:inline-block; margin-top:6px;\">Developed by <strong style=\"color:inherit;\">Mr. Nilesh Chaudhary</strong> · Senior Manager · EC No. 161824</span>\n    </div>\n  </div>\n</div>\n\n<!-- ============ APP ============ -->\n<div class=\"app locked\" id=\"main-app\">\n\n  <header>\n    <div class=\"logo-mark\">₹</div>\n    <div class=\"brand\">\n      <h1>Cash Desk Console</h1>\n      <div class=\"sub\">\n        <span>Daily cashier utility</span>\n        <span class=\"dot\">·</span>\n        <span>Logged in as <strong id=\"hdr-user\">—</strong></span>\n        <span class=\"dot\">·</span>\n        <span class=\"session-chip\"><span class=\"pulse\"></span> Session <span class=\"mono\" id=\"session-timer\">15:00</span></span>\n        <span class=\"dot\">·</span>\n        <span class=\"clock-chip\"><span class=\"mono\" id=\"live-clock\">--:--:--</span> <span class=\"mono dim\" id=\"live-date\"></span></span>\n      </div>\n    </div>\n    <div class=\"hdr-right\">\n      <div class=\"hdr-pill\">\n        <span class=\"k\">Date</span>\n        <input type=\"date\" id=\"docketDate\">\n      </div>\n      <div class=\"hdr-pill\">\n        <span class=\"k\">Branch</span>\n        <input type=\"text\" id=\"branchName\" value=\"Main Branch\">\n      </div>\n      <button class=\"icon-btn\" title=\"Search by Serial (S or Ctrl+K)\" onclick=\"openSearchModal()\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"></circle><line x1=\"21\" y1=\"21\" x2=\"16.5\" y2=\"16.5\"></line></svg>\n      </button>\n      <button class=\"icon-btn\" title=\"Change PIN\" onclick=\"showChangePinScreen()\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 2L15 5L9 11L6 8L12 2Z\"></path><path d=\"M18 14V20H4V6H10\"></path><circle cx=\"14\" cy=\"10\" r=\"1.5\"></circle></svg>\n      </button>\n      <button class=\"icon-btn\" title=\"Logout\" onclick=\"logout()\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M9 21H5C3.89 21 3 20.11 3 19V5C3 3.89 3.89 3 5 3H9\"></path><polyline points=\"16 17 21 12 16 7\"></polyline><line x1=\"21\" y1=\"12\" x2=\"9\" y2=\"12\"></line></svg>\n      </button>\n    </div>\n  </header>\n\n  <nav class=\"tabs\">\n    <button class=\"tab-btn active\" data-tab=\"home\">Dashboard</button>\n    <button class=\"tab-btn\" data-tab=\"receipts\">Receipts <span class=\"badge\" id=\"tab-rec-count\">0</span></button>\n    <button class=\"tab-btn\" data-tab=\"payments\">Payments <span class=\"badge\" id=\"tab-pay-count\">0</span></button>\n    <button class=\"tab-btn\" data-tab=\"exchanges\">Exchange <span class=\"badge\" id=\"tab-exch-count\">0</span></button>\n    <button class=\"tab-btn\" data-tab=\"docket\">Docket</button>\n    <button class=\"tab-btn\" data-tab=\"coh\">Cash on Hand</button>\n    <button class=\"tab-btn\" data-tab=\"tools\">Advanced Tools</button>\n    <button class=\"tab-btn\" data-tab=\"history\">History</button>\n    <button class=\"tab-btn\" data-tab=\"notes\">Notes <span class=\"badge\" id=\"tab-notes-count\">0</span></button>\n  </nav>\n\n  <!-- DASHBOARD -->\n  <div class=\"tab-content active\" id=\"tab-home\">\n    <div class=\"hero-grid\">\n      <div class=\"hero-main\">\n        <div class=\"eyebrow\">Current Cash on Hand</div>\n        <div class=\"amount\"><span class=\"rup\">₹</span><span id=\"hero-cash\">0</span></div>\n        <div class=\"words\" id=\"hero-words\">Zero Rupees Only</div>\n      </div>\n      <div class=\"hero-side\">\n        <div class=\"hero-stat pos\">\n          <span class=\"tag\">▲ Receipts Today</span>\n          <div class=\"big\">₹<span id=\"stat-rec-big\">0</span></div>\n          <div class=\"meta\"><span>Cash in</span><span class=\"mono\"><span id=\"stat-rec-count\">0</span> txns</span></div>\n        </div>\n        <div class=\"hero-stat neg\">\n          <span class=\"tag\">▼ Payments Today</span>\n          <div class=\"big\">₹<span id=\"stat-pay-big\">0</span></div>\n          <div class=\"meta\"><span>Cash out</span><span class=\"mono\"><span id=\"stat-pay-count\">0</span> txns</span></div>\n        </div>\n      </div>\n    </div>\n\n    <div class=\"stat-strip\">\n      <div class=\"stat-cell\">\n        <div class=\"s-label\">Opening Cash</div>\n        <div class=\"s-value\">₹<span id=\"stat-open\">0</span></div>\n        <div class=\"s-sub\" id=\"stat-open-mode\">Auto-carried forward</div>\n      </div>\n      <div class=\"stat-cell accent\">\n        <div class=\"s-label\">Net Movement</div>\n        <div class=\"s-value\" id=\"stat-net-wrap\">₹<span id=\"stat-net\">0</span></div>\n        <div class=\"s-sub\">Receipt − Payment</div>\n      </div>\n      <div class=\"stat-cell\">\n        <div class=\"s-label\">Exchanges</div>\n        <div class=\"s-value\">₹<span id=\"stat-exch\">0</span></div>\n        <div class=\"s-sub\"><span id=\"stat h-dl-total\">0</td>\n              <td id=\"coh-amt-total\">₹0</td>\n            </tr>\n          </tfoot>\n        </table>\n      </div>\n    </div>\n\n    <div class=\"panel\">\n      <div class=\"panel-title\"><span class=\"t-label\">Reconciliation</span></div>\n      <div class=\"recon-grid\">\n        <div class=\"recon-card info\">\n          <div class=\"label\">Book Closing</div>\n          <div class=\"val\">₹<span id=\"recon-book\">0</span></div>\n        </div>\n        <div class=\"recon-card warn\">\n          <div class=\"label\">Physical (SL + DL)</div>\n          <div class=\"val\">₹<span id=\"recon-phy\">0</span></div>\n        </div>\n        <div class=\"recon-card\" id=\"recon-diff-card\">\n          <div class=\"label\">Difference</div>\n          <div class=\"val\">₹<span id=\"recon-diff\">0</span></div>\n        </div>\n      </div>\n    </div>\n  </div>\n\n  <!-- ADVANCED TOOLS -->\n  <div class=\"tab-content\" id=\"tab-tools\">\n    <div class=\"tools-grid\">\n\n      <div class=\"tool-card\">\n        <h4>Quick Calculator</h4>\n        <div class=\"tool-desc\">Simple arithmetic with ₹ formatting</div>\n        <div class=\"tool-body\">\n          <input type=\"text\" id=\"calc-expr\" placeholder=\"e.g. 25000 + 1500 - 230\" oninput=\"runCalc()\">\n          <div class=\"tool-out\" id=\"calc-out\"><span class=\"big\">₹0.00</span>Result appears here</div>\n        </div>\n      </div>\n\n      <div class=\"tool-card\">\n        <h4>Denomination Breakdown</h4>\n        <div class=\"tool-desc\">Amount nikalne ka optimal mix — sirf available cash से</div>\n        <div class=\"tool-body\">\n          <input type=\"number\" id=\"brk-amount\" placeholder=\"Enter amount ₹\" oninput=\"runBreakdown()\">\n          <div class=\"tool-out\" id=\"brk-out\">Enter amount to see breakdown from available cash</div>\n        </div>\n      </div>\n\n      <div class=\"tool-card\">\n        <h4>Split Cash</h4>\n        <div class=\"tool-desc\">Split amount between N people (equal / custom)</div>\n        <div class=\"tool-body\">\n          <div style=\"display:grid; grid-template-columns: 1fr 80px; gap:8px;\">\n            <input type=\"number\" id=\"split-amt\" placeholder=\"Total amount ₹\" oninput=\"runSplit()\">\n            <input type=\"number\" id=\"split-n\" placeholder=\"N\" value=\"2\" min=\"1\" oninput=\"runSplit()\">\n          </div>\n          <div class=\"tool-out\" id=\"split-out\">Per person: ₹0.00</div>\n        </div>\n      </div>\n\n      <div class=\"tool-card\">\n        <h4>Amount → Words</h4>\n        <div class=\"tool-desc\">Indian number system (Lakh/Crore format)</div>\n        <div class=\"tool-body\">\n          <input type=\"number\" id=\"words-amt\" placeholder=\"Enter amount\" oninput=\"runWords()\">\n          <div class=\"tool-out\" id=\"words-out\">Words output appears here</div>\n        </div>\n      </div>\n\n      <div class=\"tool-card\">\n        <h4>Export Day's Data</h4>\n        <div class=\"tool-desc\">Download today's register as CSV / JSON</div>\n        <div class=\"tool-body\">\n          <div class=\"flex-row\">\n            <button class=\"btn btn-primary\" onclick=\"exportCSV()\">⬇ Export CSV</button>\n            <button class=\"btn\" onclick=\"exportJSON()\">⬇ Export JSON</button>\n            <button class=\"btn\" onclick=\"window.print()\">🖨 Print / PDF</button>\n          </div>\n          <div class=\"tool-out\" style=\"min-height:50px;\">Downloads current day — Receipts, Payments, Exchanges, Opening/Closing, Cash-on-Hand</div>\n        </div>\n      </div>\n\n      <div class=\"tool-card\">\n        <h4>Backup &amp; Restore</h4>\n        <div class=\"tool-desc\">Full data export (all days) &amp; import</div>\n        <div class=\"tool-body\">\n          <div class=\"flex-row\">\n            <button class=\"btn btn-primary\" onclick=\"backupAll()\">⬇ Backup All</button>\n            <label class=\"btn\" style=\"cursor:pointer;\">\n              ⬆ Restore <input type=\"file\" accept=\".json\" style=\"display:none;\" onchange=\"restoreAll(event)\">\n            </label>\n            <button class=\"btn btn-neg\" onclick=\"wipeAll()\">🗑 Wipe</button>\n          </div>\n          <div class=\"tool-out\" style=\"min-height:50px;\" id=\"backup-out\">Backup includes: all saved dockets, current day data, settings</div>\n        </div>\n      </div>\n\n      <div class=\"tool-card\">\n        <h4>Day Close Snapshot</h4>\n        <div class=\"tool-desc\">Save current day to history; start fresh tomorrow</div>\n        <div class=\"tool-body\">\n          <button class=\"btn btn-primary\" onclick=\"closeDay()\">🔒 Close Day &amp; Save</button>\n          <div class=\"tool-out\" style=\"min-height:50px;\" id=\"close-out\">Saves current entries with auto-generated summary. Closing cash will become tomorrow's opening.</div>\n        </div>\n      </div>\n\n    </div>\n  </div>\n\n  <!-- HISTORY -->\n  <div class=\"tab-content\" id=\"tab-history\">\n    <div class=\"panel\">\n      <div class=\"panel-title\">\n        <span class=\"t-label\">Saved Dockets · History</span>\n        <div class=\"flex-row\">\n          <button class=\"btn btn-sm\" onclick=\"refreshHistory()\">↻ Refresh</button>\n          <button class=\"btn btn-sm btn-ghost\" onclick=\"window.print()\">🖨 Print</button>\n        </div>\n      </div>\n      <div class=\"table-wrap\">\n        <table style=\"min-width:800px;\">\n          <thead><tr>\n            <th class=\"txt-l\">Date</th>\n            <th>Cashier</th>\n            <th>Opening ₹</th>\n            <th>Receipts ₹</th>\n            <th>Payments ₹</th>\n            <th>Closing ₹</th>\n            <th>Txns</th>\n            <th class=\"no-print\">Actions</th>\n          </tr></thead>\n          <tbody id=\"history-body\"><tr><td colspan=\"8\" class=\"row-empty\"><div class=\"display\">No history yet</div>Close a day first to see it here</td></tr></tbody>\n        </table>\n      </div>\n    </div>\n  </div>\n\n  <!-- NOTES -->\n  <div class=\"tab-content\" id=\"tab-notes\">\n    <div class=\"panel\">\n      <div class=\"panel-title\">\n        <span class=\"t-label\">Notes &amp; Memos <span class=\"pill dim\" id=\"notes-count-pill\">0 saved</span></span>\n        <div class=\"flex-row\">\n          <input type=\"text\" id=\"notes-search\" placeholder=\"Search notes…\" style=\"padding: 6px 12px; min-width: 220px;\">\n          <button class=\"btn btn-sm btn-pos\" onclick=\"openNoteModal()\">+ New Note</button>\n          <button class=\"btn btn-sm btn-ghost\" onclick=\"clearAllNotes()\">Clear All</button>\n        </div>\n      </div>\n      <div class=\"notes-board\" id=\"notes-board\">\n        <div class=\"row-empty\"><div class=\"display\">No notes yet</div>Press <kbd class=\"kbd-inline\">N</kbd> or tap \"+ New Note\" to save a memo</div>\n      </div>\n    </div>\n  </div>\n\n  <footer class=\"app-footer\">\n    <div class=\"foot-left\">\n      <span class=\"mono\">CASH DESK CONSOLE</span>\n      <span class=\"dot\">·</span>\n      <span>v1.0</span>\n      <span class=\"dot\">·</span>\n      <span>Local device only · No data leaves your browser</span>\n    </div>\n    <div class=\"foot-right\">\n      <span>Developed by</span>\n      <strong>Mr. Nilesh Chaudhary</strong>\n      <span class=\"dot\">·</span>\n      <span>Senior Manager</span>\n      <span class=\"dot\">·</span>\n      <span class=\"mono\">EC No. 161824</span>\n    </div>\n  </footer>\n\n</div>\n\n<!-- ============ ENTRY MODAL ============ -->\n<div class=\"modal-bd\" id=\"entry-modal\">\n  <div class=\"modal wide\">\n    <div class=\"modal-h\">\n      <h3 class=\"display\" id=\"entry-title\">New Receipt <span class=\"kind-tag rec\" id=\"entry-kind\">Receipt</span></h3>\n      <button class=\"icon-btn\" onclick=\"closeEntryModal()\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"></line><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"></line></svg>\n      </button>\n    </div>\n    <div class=\"modal-b\">\n      <div class=\"entry-err\" id=\"entry-err\" style=\"display:none;\"></div>\n      <div class=\"form-row\">\n        <div class=\"field\">\n          <label>Account / Particulars</label>\n          <input type=\"text\" id=\"entry-acno\" placeholder=\"A/c No. / Name / Narration\">\n        </div>\n        <div class=\"field\">\n          <label>Total Amount ₹</label>\n          <input type=\"number\" class=\"num\" id=\"entry-amount\" placeholder=\"0.00\" step=\"0.01\">\n        </div>\n      </div>\n      <div class=\"modal-denom\">\n        <div class=\"panel-title\">\n          <span class=\"t-label\">Denomination Breakdown</span>\n          <span id=\"entry-tally\" class=\"pill dim\">Enter quantities</span>\n        </div>\n        <div class=\"suggest-row\" id=\"entry-suggest\" style=\"display:none;\">\n          <span class=\"s-msg\" id=\"entry-suggest-msg\">💡 <strong>Payment suggestion</strong> — 500 &amp; 100 notes first, then rest from available cash.</span>\n          <button type=\"button\" class=\"btn btn-sm btn-ghost\" onclick=\"previewPaymentSuggestion()\" id=\"entry-suggest-preview-btn\">🎯 Suggest</button>\n          <button type=\"button\" class=\"btn btn-sm btn-primary\" onclick=\"applyPaymentSuggestion()\" id=\"entry-suggest-apply-btn\" style=\"display:none;\">✓ Apply</button>\n          <button type=\"button\" class=\"btn btn-sm btn-ghost\" onclick=\"clearEntryDenoms()\">Clear</button>\n        </div>\n        <div class=\"suggest-preview\" id=\"entry-suggest-preview\" style=\"display:none;\"></div>\n        <div class=\"denom-grid\" id=\"entry-denom-grid\"></div>\n        <div id=\"entry-note-count\" style=\"padding:8px 0 0;font-size:.85rem;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap;\"><span>Total Notes: <strong id=\"entry-note-count-val\" style=\"color:var(--text)\">0</strong> pcs</span><span>Total Coins: <strong id=\"entry-coin-count-val\" style=\"color:var(--text)\">0</strong> pcs</span></div>\n      </div>\n      <div class=\"form-row\" style=\"margin-top:12px;\">\n        <div class=\"field\" style=\"flex:1;\">\n          <label>📝 Note (optional)</label>\n          <input type=\"text\" id=\"entry-note\" placeholder=\"Cheque no., remark, special instruction…\">\n        </div>\n      </div>\n    </div>\n    <div class=\"modal-f\">\n      <span class=\"tally-disp\" id=\"entry-tally-disp\">—</span>\n      <div class=\"flex-row\">\n        <button class=\"btn btn-ghost\" onclick=\"closeEntryModal()\">Cancel</button>\n        <button class=\"btn btn-primary\" onclick=\"saveEntry()\">Save Entry</button>\n      </div>\n    </div>\n  </div>\n</div>\n\n<!-- ============ EXCHANGE MODAL ============ -->\n<div class=\"modal-bd\" id=\"exch-modal\">\n  <div class=\"modal wide\">\n    <div class=\"modal-h\">\n      <h3 class=\"display\">Cash Exchange <span class=\"kind-tag exch\">Amount Neutral</span></h3>\n      <button class=\"icon-btn\" onclick=\"closeExchangeModal()\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"></line><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"></line></svg>\n      </button>\n    </div>\n    <div class=\"modal-b\">\n      <div class=\"form-row\">\n        <div class=\"field\">\n          <label>Party Name / Reference</label>\n          <input type=\"text\" id=\"exch-ref\" placeholder=\"Customer name / ref\">\n        </div>\n        <div class=\"field\">\n          <label>Note</label>\n          <input type=\"text\" id=\"exch-note\" placeholder=\"Optional narration\">\n        </div>\n      </div>\n      <div class=\"exch-cols\">\n        <div class=\"exch-col given\">\n          <h4>Given (Cash In) <span class=\"sum mono\">₹<span id=\"exch-g-sum\">0</span></span></h4>\n          <div class=\"denom-grid\" id=\"exch-g-grid\"></div>\n        </div>\n        <div class=\"exch-col recvd\">\n          <h4>Received (Cash Out) <span class=\"sum mono\">₹<span id=\"exch-r-sum\">0</span></span></h4>\n          <div class=\"denom-grid\" id=\"exch-r-grid\"></div>\n        </div>\n      </div>\n      <div class=\"exch-balance empty\" id=\"exch-balance\">⚖ Enter both sides — they must match</div>\n    </div>\n    <div class=\"modal-f\">\n      <span class=\"tally-disp\">Both sides must be equal ₹</span>\n      <div class=\"flex-row\">\n        <button class=\"btn btn-ghost\" onclick=\"closeExchangeModal()\">Cancel</button>\n        <button class=\"btn btn-primary\" onclick=\"saveExchange()\">Save Exchange</button>\n      </div>\n    </div>\n  </div>\n</div>\n\n<!-- ============ CHANGE PIN MODAL ============ -->\n<div class=\"modal-bd\" id=\"changepin-modal\">\n  <div class=\"modal\" style=\"max-width: 460px;\">\n    <div class=\"modal-h\">\n      <h3 class=\"display\">Change PIN</h3>\n      <button class=\"icon-btn\" onclick=\"closeChangePin()\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"></line><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"></line></svg>\n      </button>\n    </div>\n    <div class=\"modal-b\">\n      <div class=\"auth-form\">\n        <div class=\"field\">\n          <label>Current PIN</label>\n          <input type=\"password\" id=\"cp-old\" class=\"pin-input\" maxlength=\"4\" inputmode=\"numeric\" placeholder=\"••••\">\n        </div>\n        <div class=\"field\">\n          <label>New PIN</label>\n          <input type=\"password\" id=\"cp-new1\" class=\"pin-input\" maxlength=\"4\" inputmode=\"numeric\" placeholder=\"••••\">\n        </div>\n        <div class=\"field\">\n          <label>Confirm New PIN</label>\n          <input type=\"password\" id=\"cp-new2\" class=\"pin-input\" maxlength=\"4\" inputmode=\"numeric\" placeholder=\"••••\">\n        </div>\n        <div class=\"auth-err\" id=\"cp-err\"></div>\n      </div>\n    </div>\n    <div class=\"modal-f\">\n      <span></span>\n      <div class=\"flex-row\">\n        <button class=\"btn btn-ghost\" onclick=\"closeChangePin()\">Cancel</button>\n        <button class=\"btn btn-primary\" onclick=\"doChangePin()\">Update PIN</button>\n      </div>\n    </div>\n  </div>\n</div>\n\n<!-- ============ NOTE MODAL ============ -->\n<div class=\"modal-bd\" id=\"note-modal\">\n  <div class=\"modal\" style=\"max-width: 560px;\">\n    <div class=\"modal-h\">\n      <h3 class=\"display\" id=\"note-modal-title\">📝 New Note</h3>\n      <button class=\"icon-btn\" onclick=\"closeNoteModal()\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"></line><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"></line></svg>\n      </button>\n    </div>\n    <div class=\"modal-b\">\n      <div class=\"field\">\n        <label>Note</label>\n        <textarea id=\"note-text\" rows=\"6\" placeholder=\"Likho kuch… reminder, observation, cashier memo, day-end observation, etc.\" style=\"width:100%; padding:12px; font-family: var(--font-sans); font-size:14px; background: var(--panel-hi); border:1px solid var(--border); border-radius:10px; color: var(--text); resize:vertical;\"></textarea>\n      </div>\n      <div class=\"field\" style=\"margin-top:12px;\">\n        <label>Color</label>\n        <div class=\"note-color-picker\" id=\"note-color-picker\">\n          <button class=\"nc-chip c-none active\" data-color=\"\" title=\"Default\"></button>\n          <button class=\"nc-chip c-yellow\" data-color=\"yellow\" title=\"Yellow\"></button>\n          <button class=\"nc-chip c-blue\" data-color=\"blue\" title=\"Blue\"></button>\n          <button class=\"nc-chip c-green\" data-color=\"green\" title=\"Green\"></button>\n          <button class=\"nc-chip c-pink\" data-color=\"pink\" title=\"Pink\"></button>\n          <button class=\"nc-chip c-violet\" data-color=\"violet\" title=\"Violet\"></button>\n        </div>\n      </div>\n      <div class=\"field\" style=\"margin-top:12px;\">\n        <label style=\"display:flex; align-items:center; gap:8px; cursor:pointer;\">\n          <input type=\"checkbox\" id=\"note-pinned\" style=\"width:16px; height:16px;\">\n          <span>Pin this note to top</span>\n        </label>\n      </div>\n    </div>\n    <div class=\"modal-f\">\n      <button class=\"btn btn-ghost\" onclick=\"closeNoteModal()\">Cancel</button>\n      <button class=\"btn btn-primary\" onclick=\"saveNote()\">💾 Save Note</button>\n    </div>\n  </div>\n</div>\n\n<!-- ============ VOUCHER SERIAL POPUP ============ -->\n<div class=\"modal-bd\" id=\"voucher-modal\">\n  <div class=\"modal\" style=\"max-width: 520px;\">\n    <div class=\"modal-h\">\n      <h3 class=\"display\">✓ Saved — Write on Voucher</h3>\n      <button class=\"icon-btn\" onclick=\"closeVoucher()\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"></line><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"></line></svg>\n      </button>\n    </div>\n    <div class=\"modal-b\">\n      <div class=\"voucher-card\">\n        <div class=\"vc-label\">Serial Number</div>\n        <div class=\"vc-serial\" id=\"v-serial\">R1</div>\n        <div class=\"vc-line\" id=\"v-kind\">Receipt</div>\n      </div>\n      <div class=\"voucher-meta\">\n        <div class=\"vm-row\"><span>Amount</span><strong class=\"mono\">₹<span id=\"v-amt\">0</span></strong></div>\n        <div class=\"vm-row\"><span>Account / Ref</span><strong id=\"v-acc\">—</strong></div>\n        <div class=\"vm-row\"><span>Time</span><strong class=\"mono\" id=\"v-time\">—</strong></div>\n        <div class=\"vm-row\"><span>Notes</span><strong class=\"mono\"><span id=\"v-notes\">0</span> pcs</strong></div>\n        <div class=\"vm-row\"><span>Coins</span><strong class=\"mono\"><span id=\"v-coins\">0</span> pcs</strong></div>\n      </div>\n      <div class=\"voucher-instruct\">\n        ✍ Please write <strong class=\"mono\" id=\"v-serial-inline\">R1</strong> on the physical voucher / slip.\n      </div>\n    </div>\n    <div class=\"modal-f\">\n      <span class=\"tally-disp\">Voucher reference for today's docket</span>\n      <div class=\"flex-row\">\n        <button class=\"btn btn-ghost\" onclick=\"closeVoucher()\">Close</button>\n        <button class=\"btn btn-primary\" onclick=\"closeVoucher()\">✓ Got it</button>\n      </div>\n    </div>\n  </div>\n</div>\n\n<!-- ============ SEARCH MODAL ============ -->\n<div class=\"modal-bd\" id=\"search-modal\">\n  <div class=\"modal\" style=\"max-width: 640px;\">\n    <div class=\"modal-h\">\n      <h3 class=\"display\">🔍 Search by Serial</h3>\n      <button class=\"icon-btn\" onclick=\"closeSearch()\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"></line><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"></line></svg>\n      </button>\n    </div>\n    <div class=\"modal-b\">\n      <div class=\"form-row\">\n        <div class=\"field\" style=\"flex:1;\">\n          <label>Serial number (e.g. <span class=\"mono\">R5</span>, <span class=\"mono\">P12</span>, <span class=\"mono\">E2</span>)</label>\n          <input type=\"text\" id=\"search-serial\" placeholder=\"Type serial and press Enter\" autocomplete=\"off\" style=\"text-transform:uppercase; letter-spacing:0.08em; font-family:var(--font-mono);\">\n        </div>\n      </div>\n      <div id=\"search-result\" class=\"search-result-area\"></div>\n    </div>\n    <div class=\"modal-f\">\n      <span class=\"tally-disp\" id=\"search-hint\">Tip: also works with account / ref text</span>\n      <div class=\"flex-row\">\n        <button class=\"btn btn-ghost\" onclick=\"closeSearch()\">Close</button>\n      </div>\n    </div>\n  </div>\n</div>\n\n<!-- ============ TWEAKS PANEL ============ -->\n<button class=\"tw-toggle-btn\" id=\"tw-toggle\" onclick=\"toggleTweaks()\">✦</button>\n<div class=\"tw-panel\" id=\"tw-panel\">\n  <h4>Tweaks <button class=\"tw-close\" onclick=\"toggleTweaks()\">×</button></h4>\n  <div class=\"tw-group\">\n    <label>Theme</label>\n    <div class=\"tw-options tw-themes\">\n      <button class=\"tw-opt\" data-tw=\"theme\" data-val=\"midnight\">\n        <div class=\"tw-swatch\">\n          <div class=\"sw-dots\"><span style=\"background:#0d0f14\"></span><span style=\"background:#ffd43b\"></span></div>\n          Midnight\n        </div>\n      </button>\n      <button class=\"tw-opt\" data-tw=\"theme\" data-val=\"sunrise\">\n        <div class=\"tw-swatch\">\n          <div class=\"sw-dots\"><span style=\"background:#fdf8f2\"></span><span style=\"background:#e34d1c\"></span></div>\n          Sunrise\n        </div>\n      </button>\n      <button class=\"tw-opt\" data-tw=\"theme\" data-val=\"mono\">\n        <div class=\"tw-swatch\">\n          <div class=\"sw-dots\"><span style=\"background:#f4f4f2\"></span><span style=\"background:#0a0a0a\"></span></div>\n          Mono\n        </div>\n      </button>\n      <button class=\"tw-opt\" data-tw=\"theme\" data-val=\"ocean\">\n        <div class=\"tw-swatch\">\n          <div class=\"sw-dots\"><span style=\"background:#0a1929\"></span><span style=\"background:#38bdf8\"></span></div>\n          Ocean\n        </div>\n      </button>\n      <button class=\"tw-opt\" data-tw=\"theme\" data-val=\"forest\">\n        <div class=\"tw-swatch\">\n          <div class=\"sw-dots\"><span style=\"background:#0f1511\"></span><span style=\"background:#4ade80\"></span></div>\n          Forest\n        </div>\n      </button>\n      <button class=\"tw-opt\" data-tw=\"theme\" data-val=\"lavender\">\n        <div class=\"tw-swatch\">\n          <div class=\"sw-dots\"><span style=\"background:#f8f6fc\"></span><span style=\"background:#7c3aed\"></span></div>\n          Lavender\n        </div>\n      </button>\n      <button class=\"tw-opt\" data-tw=\"theme\" data-val=\"crimson\">\n        <div class=\"tw-swatch\">\n          <div class=\"sw-dots\"><span style=\"background:#fbf7f5\"></span><span style=\"background:#dc2626\"></span></div>\n          Crimson\n        </div>\n      </button>\n      <button class=\"tw-opt\" data-tw=\"theme\" data-val=\"graphite\">\n        <div class=\"tw-swatch\">\n          <div class=\"sw-dots\"><span style=\"background:#111418\"></span><span style=\"background:#22d3ee\"></span></div>\n          Graphite\n        </div>\n      </button>\n    </div>\n  </div>\n  <div class=\"tw-group\">\n    <label>Accent Color</label>\n    <div class=\"tw-accent-row\">\n      <div class=\"tw-accent-swatches\" id=\"tw-accent-swatches\">\n        <button class=\"tw-accent-sw\" data-accent=\"\" title=\"Reset to theme default\"><span class=\"accent-x\">✕</span></button>\n        <button class=\"tw-accent-sw\" data-accent=\"#ef4444\" style=\"background:#ef4444\" title=\"Red\"></button>\n        <button class=\"tw-accent-sw\" data-accent=\"#f97316\" style=\"background:#f97316\" title=\"Orange\"></button>\n        <button class=\"tw-accent-sw\" data-accent=\"#eab308\" style=\"background:#eab308\" title=\"Yellow\"></button>\n        <button class=\"tw-accent-sw\" data-accent=\"#22c55e\" style=\"background:#22c55e\" title=\"Green\"></button>\n        <button class=\"tw-accent-sw\" data-accent=\"#14b8a6\" style=\"background:#14b8a6\" title=\"Teal\"></button>\n        <button class=\"tw-accent-sw\" data-accent=\"#06b6d4\" style=\"background:#06b6d4\" title=\"Cyan\"></button>\n        <button class=\"tw-accent-sw\" data-accent=\"#3b82f6\" style=\"background:#3b82f6\" title=\"Blue\"></button>\n        <button class=\"tw-accent-sw\" data-accent=\"#8b5cf6\" style=\"background:#8b5cf6\" title=\"Violet\"></button>\n        <button class=\"tw-accent-sw\" data-accent=\"#ec4899\" style=\"background:#ec4899\" title=\"Pink\"></button>\n      </div>\n      <label class=\"tw-accent-custom\">\n        <input type=\"color\" id=\"tw-accent-picker\" value=\"#e34d1c\">\n        <span>Custom</span>\n      </label>\n    </div>\n  </div>\n  <div class=\"tw-group\">\n    <label>Font Pairing</label>\n    <div class=\"tw-options\">\n      <button class=\"tw-opt\" data-tw=\"font\" data-val=\"grotesk\">Grotesk</button>\n      <button class=\"tw-opt\" data-tw=\"font\" data-val=\"manrope\">Manrope</button>\n      <button class=\"tw-opt\" data-tw=\"font\" data-val=\"mono\">Mono</button>\n    </div>\n  </div>\n  <div class=\"tw-group\">\n    <label>Density</label>\n    <div class=\"tw-options\">\n      <button class=\"tw-opt\" data-tw=\"density\" data-val=\"cozy\">Cozy</button>\n      <button class=\"tw-opt\" data-tw=\"density\" data-val=\"compact\">Compact</button>\n    </div>\n  </div>\n  <div class=\"tw-group\">\n    <label>Advanced features</label>\n    <div class=\"tw-options\">\n      <button class=\"tw-opt\" data-tw=\"advanced\" data-val=\"on\">Show</button>\n      <button class=\"tw-opt\" data-tw=\"advanced\" data-val=\"off\">Hide</button>\n    </div>\n  </div>\n</div>\n\n<script>\n// ============ TWEAKABLE DEFAULTS ============\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"theme\": \"sunrise\",\n  \"font\": \"grotesk\",\n  \"density\": \"compact\",\n  \"advanced\": \"on\",\n  \"accent\": \"#22c55e\"\n}/*EDITMODE-END*/;\n\n// Apply on load\nfunction applyTweaks(t) {\n  document.documentElement.setAttribute('data-theme', t.theme);\n  document.documentElement.setAttribute('data-font', t.font);\n  document.documentElement.setAttribute('data-density', t.density);\n  // Accent color override\n  if (t.accent && /^#[0-9a-f]{6}$/i.test(t.accent)) {\n    document.documentElement.setAttribute('data-accent-override', '1');\n    document.documentElement.style.setProperty('--custom-accent', t.accent);\n    // Glow = accent + 35% alpha\n    const r = parseInt(t.accent.slice(1,3), 16);\n    const g = parseInt(t.accent.slice(3,5), 16);\n    const b = parseInt(t.accent.slice(5,7), 16);\n    document.documentElement.style.setProperty('--custom-accent-glow', `rgba(${r},${g},${b},0.25)`);\n    // Accent-ink = contrast color (white for dark, near-black for light)\n    const lum = (0.299*r + 0.587*g + 0.114*b) / 255;\n    document.documentElement.style.setProperty('--accent-ink', lum > 0.6 ? '#0a0a0a' : '#ffffff');\n  } else {\n    document.documentElement.removeAttribute('data-accent-override');\n    document.documentElement.style.removeProperty('--custom-accent');\n    document.documentElement.style.removeProperty('--custom-accent-glow');\n    document.documentElement.style.removeProperty('--accent-ink');\n  }\n  // Advanced features toggle - hide tools tab & calculator bits\n  const toolsTab = document.querySelector('[data-tab=\"tools\"]');\n  if (toolsTab) toolsTab.style.display = (t.advanced === 'off') ? 'none' : '';\n  // Update active states in tweaks panel\n  document.querySelectorAll('.tw-opt').forEach(b => {\n    const k = b.dataset.tw, v = b.dataset.val;\n    b.classList.toggle('active', t[k] === v);\n  });\n  // Update active accent swatch\n  document.querySelectorAll('.tw-accent-sw').forEach(sw => {\n    sw.classList.toggle('active', (sw.dataset.accent || '') === (t.accent || ''));\n  });\n  // Sync color picker\n  const picker = document.getElementById('tw-accent-picker');\n  if (picker && t.accent) picker.value = t.accent;\n}\nlet currentTweaks = { ...TWEAK_DEFAULTS };\napplyTweaks(currentTweaks);\n\n// Tweak panel interactivity\ndocument.querySelectorAll('.tw-opt').forEach(btn => {\n  btn.addEventListener('click', () => {\n    const k = btn.dataset.tw, v = btn.dataset.val;\n    currentTweaks[k] = v;\n    applyTweaks(currentTweaks);\n    try {\n      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');\n    } catch (e) {}\n    localStorage.setItem('cdc_tweaks', JSON.stringify(currentTweaks));\n  });\n});\n\n// Accent swatches\ndocument.querySelectorAll('.tw-accent-sw').forEach(sw => {\n  sw.addEventListener('click', () => {\n    const v = sw.dataset.accent || '';\n    currentTweaks.accent = v;\n    applyTweaks(currentTweaks);\n    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accent: v } }, '*'); } catch(e){}\n    localStorage.setItem('cdc_tweaks', JSON.stringify(currentTweaks));\n  });\n});\n\n// Custom color picker\nconst accentPicker = document.getElementById('tw-accent-picker');\nif (accentPicker) {\n  accentPicker.addEventListener('input', e => {\n    const v = e.target.value;\n    currentTweaks.accent = v;\n    applyTweaks(currentTweaks);\n    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accent: v } }, '*'); } catch(e){}\n    localStorage.setItem('cdc_tweaks', JSON.stringify(currentTweaks));\n  });\n}\n// Load saved tweaks\ntry {\n  const saved = JSON.parse(localStorage.getItem('cdc_tweaks') || 'null');\n  if (saved) { currentTweaks = { ...currentTweaks, ...saved }; applyTweaks(currentTweaks); }\n} catch (e) {}\n\n// Edit mode integration\nwindow.addEventListener('message', e => {\n  if (e.data?.type === '__activate_edit_mode') document.getElementById('tw-toggle').classList.add('visible');\n  if (e.data?.type === '__deactivate_edit_mode') {\n    document.getElementById('tw-toggle').classList.remove('visible');\n    document.getElementById('tw-panel').classList.remove('open');\n  }\n});\ntry { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch(e){}\nfunction toggleTweaks() { document.getElementById('tw-panel').classList.toggle('open'); }\n\n// ============ DATA ============\nconst DENOMS = [\n  { val: 500, type: 'note' },\n  { val: 200, type: 'note' },\n  { val: 100, type: 'note' },\n  { val: 50,  type: 'note' },\n  { val: 20,  type: 'note' },\n  { val: 10,  type: 'note' },\n  { val: 5,   type: 'note' },\n  { val: 20,  type: 'coin' },\n  { val: 10,  type: 'coin' },\n  { val: 5,   type: 'coin' },\n  { val: 2,   type: 'coin' },\n  { val: 1,   type: 'coin' }\n];\nconst denomKey = (d) => `${d.val}${d.type[0]}`; // e.g. 500n, 20c\nconst DENOM_KEYS = DENOMS.map(denomKey);\n\n// Initialize empty denom object\nconst emptyDenoms = () => DENOMS.reduce((o, d) => { o[denomKey(d)] = 0; return o; }, {});\n\n// State — per-day\nlet state = {\n  date: todayISO(),\n  cashier: '',\n  branch: 'Main Branch',\n  opening: emptyDenoms(),\n  openingManual: false,\n  receipts: [], // { id, acno, amount, denoms, note }\n  payments: [],\n  exchanges: [], // { id, ref, note, given, received }\n  coh: { sl: emptyDenoms() }, // Double lock derived\n  notes: [], // [{ id, serial, text, ts, pinned, color }]\n  history: [] // [{ date, ... }]\n};\n\nfunction todayISO() {\n  const d = new Date();\n  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;\n}\nfunction uid() { return Math.random().toString(36).slice(2, 10); }\n\n// Serial numbers per day (R1, R2, P1, P2, E1, E2...).\n// We scan existing rows for the highest numeric serial of that type and +1.\nfunction nextSerial(type) {\n  const prefix = type === 'rec' ? 'R' : type === 'pay' ? 'P' : 'E';\n  const list = type === 'rec' ? state.receipts : type === 'pay' ? state.payments : state.exchanges;\n  const nums = list.map(r => {\n    const m = /^[RPE](\\d+)$/i.exec(r.serial || '');\n    return m ? parseInt(m[1]) : 0;\n  });\n  const max = nums.length ? Math.max(...nums) : 0;\n  return `${prefix}${max + 1}`;\n}\n\nfunction saveState() {\n  localStorage.setItem('cdc_state', JSON.stringify(state));\n}\nfunction loadState() {\n  try {\n    const s = JSON.parse(localStorage.getItem('cdc_state') || 'null');\n    if (s) state = { ...state, ...s };\n  } catch (e) {}\n  // 🔧 Migration: backfill missing serials on older saved rows\n  let rNum = 0, pNum = 0, eNum = 0;\n  (state.receipts || []).forEach(r => {\n    const m = /^R(\\d+)$/i.exec(r.serial || ''); if (m) rNum = Math.max(rNum, +m[1]);\n  });\n  (state.payments || []).forEach(r => {\n    const m = /^P(\\d+)$/i.exec(r.serial || ''); if (m) pNum = Math.max(pNum, +m[1]);\n  });\n  (state.exchanges || []).forEach(r => {\n    const m = /^E(\\d+)$/i.exec(r.serial || ''); if (m) eNum = Math.max(eNum, +m[1]);\n  });\n  (state.receipts || []).forEach(r => { if (!r.serial) r.serial = 'R' + (++rNum); });\n  (state.payments || []).forEach(r => { if (!r.serial) r.serial = 'P' + (++pNum); });\n  (state.exchanges || []).forEach(r => { if (!r.serial) r.serial = 'E' + (++eNum); });\n}\nloadState();\n\n// ============ AUTH ============\nasync function sha(str) {\n  const enc = new TextEncoder().encode(str);\n  const buf = await crypto.subtle.digest('SHA-256', enc);\n  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');\n}\nconst AUTH_KEY = 'cdc_auth';\nfunction getAuth() {\n  try { return JSON.parse(localStorage.getItem(AUTH_KEY) || 'null'); } catch { return null; }\n}\nfunction setAuth(a) { localStorage.setItem(AUTH_KEY, JSON.stringify(a)); }\n\nfunction showAuthScreen() {\n  const a = getAuth();\n  document.getElementById('setup-form').style.display = 'none';\n  document.getElementById('login-form').style.display = 'none';\n  if (a?.pin) {\n    document.getElementById('login-who').textContent = a.name || 'User';\n    document.getElementById('login-form').style.display = 'flex';\n    setTimeout(()=>document.getElementById('login-pin').focus(), 100);\n  } else {\n    document.getElementById('setup-form').style.display = 'flex';\n    setTimeout(()=>document.getElementById('setup-name').focus(), 100);\n  }\n}\n\nasync function handleSetup() {\n  const name = document.getElementById('setup-name').value.trim();\n  const p1 = document.getElementById('setup-pin1').value;\n  const p2 = document.getElementById('setup-pin2').value;\n  const err = document.getElementById('setup-err');\n  err.classList.remove('show');\n  if (!name) return showErr(err, 'Please enter your name');\n  if (!/^\\d{4}$/.test(p1)) return showErr(err, 'PIN must be 4 digits');\n  if (p1 !== p2) return showErr(err, 'PINs do not match');\n  const h = await sha(p1);\n  setAuth({ name, pin: h });\n  unlockApp();\n}\n\nasync function handleLogin() {\n  const pin = document.getElementById('login-pin').value;\n  const err = document.getElementById('login-err');\n  err.classList.remove('show');\n  if (!/^\\d{4}$/.test(pin)) return showErr(err, 'Enter 4-digit PIN');\n  const h = await sha(pin);\n  const a = getAuth();\n  if (h !== a.pin) { document.getElementById('login-pin').value = ''; return showErr(err, 'Wrong PIN'); }\n  unlockApp();\n}\n\nfunction showErr(el, msg) { el.textContent = msg; el.classList.add('show'); }\nfunction resetPin() {\n  if (confirm('Reset PIN? This will clear your PIN (data stays intact).')) {\n    localStorage.removeItem(AUTH_KEY);\n    showAuthScreen();\n  }\n}\n\nfunction unlockApp() {\n  document.getElementById('auth-bd').style.display = 'none';\n  document.getElementById('main-app').classList.remove('locked');\n  const a = getAuth();\n  document.getElementById('hdr-user').textContent = a?.name || '—';\n  autoRollToToday();\n  startSession();\n  initApp();\n}\n\n// Auto-advance working date to today on each login.\n// If user was on an older date with entries, archive it to history first\n// (same snapshot shape as closeDay); otherwise silently update the date.\nfunction autoRollToToday() {\n  const today = todayISO();\n  if (state.date === today) return;\n  const hasEntries = (state.receipts?.length || 0) + (state.payments?.length || 0) + (state.exchanges?.length || 0) > 0;\n  if (hasEntries) {\n    // Build closing totals\n    const closingTotals = DENOMS.reduce((o, d) => {\n      const k = denomKey(d);\n      const recT = state.receipts.reduce((s, r) => s + (r.denoms[k] || 0), 0);\n      const payT = state.payments.reduce((s, p) => s + (p.denoms[k] || 0), 0);\n      const exT  = state.exchanges.reduce((s, ex) => s + ((ex.given[k]||0) - (ex.received[k]||0)), 0);\n      o[k] = (state.opening[k] || 0) + recT - payT + exT;\n      return o;\n    }, {});\n    const openTotal = sumDenoms(state.opening);\n    const recTotal = state.receipts.reduce((s,r)=>s+(r.amount||0),0);\n    const payTotal = state.payments.reduce((s,p)=>s+(p.amount||0),0);\n    const closingTotal = sumDenoms(closingTotals);\n    const snapshot = {\n      date: state.date,\n      cashier: getAuth()?.name || '',\n      branch: state.branch,\n      opening: { ...state.opening },\n      receipts: JSON.parse(JSON.stringify(state.receipts)),\n      payments: JSON.parse(JSON.stringify(state.payments)),\n      exchanges: JSON.parse(JSON.stringify(state.exchanges)),\n      closing: closingTotals,\n      openingTotal: openTotal,\n      receiptTotal: recTotal,\n      paymentTotal: payTotal,\n      closingTotal,\n      receiptCount: state.receipts.length,\n      paymentCount: state.payments.length,\n      exchangeCount: state.exchanges.length,\n      autoClosed: true\n    };\n    state.history = state.history || [];\n    state.history.push(snapshot);\n    // New day: carry closing as opening\n    state.opening = { ...closingTotals };\n    state.openingManual = false;\n    state.receipts = [];\n    state.payments = [];\n    state.exchanges = [];\n    state.coh = { sl: emptyDenoms() };\n  }\n  state.date = today;\n  saveState();\n}\n\nfunction logout(force) {\n  if (!force && !confirm('Logout? Your data is saved.')) return;\n  clearSession();\n  document.getElementById('auth-bd').style.display = 'flex';\n  document.getElementById('main-app').classList.add('locked');\n  showAuthScreen();\n}\n\n// Session timer (15 min)\nlet sessionTimer = null, sessionEnd = 0;\nfunction startSession() {\n  sessionEnd = Date.now() + 15*60*1000;\n  clearInterval(sessionTimer);\n  sessionTimer = setInterval(() => {\n    const rem = Math.max(0, sessionEnd - Date.now());\n    const m = Math.floor(rem / 60000), s = Math.floor((rem % 60000) / 1000);\n    document.getElementById('session-timer').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;\n    if (rem === 0) { logout(true); }\n  }, 1000);\n  // Extend on activity\n  ['click','keydown'].forEach(ev => document.addEventListener(ev, () => sessionEnd = Date.now() + 15*60*1000));\n}\nfunction clearSession() { clearInterval(sessionTimer); }\n\n// Change PIN modal\nfunction showChangePinScreen() {\n  document.getElementById('changepin-modal').classList.add('active');\n  ['cp-old','cp-new1','cp-new2'].forEach(id => document.getElementById(id).value = '');\n  document.getElementById('cp-err').classList.remove('show');\n  setTimeout(()=>document.getElementById('cp-old').focus(), 100);\n}\nfunction closeChangePin() { document.getElementById('changepin-modal').classList.remove('active'); }\nasync function doChangePin() {\n  const old = document.getElementById('cp-old').value;\n  const n1 = document.getElementById('cp-new1').value;\n  const n2 = document.getElementById('cp-new2').value;\n  const err = document.getElementById('cp-err');\n  err.classList.remove('show');\n  const a = getAuth();\n  const oldH = await sha(old);\n  if (oldH !== a.pin) return showErr(err, 'Current PIN wrong');\n  if (!/^\\d{4}$/.test(n1)) return showErr(err, 'New PIN must be 4 digits');\n  if (n1 !== n2) return showErr(err, 'New PINs do not match');\n  a.pin = await sha(n1);\n  setAuth(a);\n  closeChangePin();\n  alert('PIN updated.');\n}\n\n// ============ NUMBER UTILS ============\nfunction fmt(n) {\n  if (n === null || n === undefined || isNaN(n)) return '0';\n  const num = Number(n);\n  // Indian format with commas\n  const [intPart, decPart] = Math.abs(num).toFixed(num % 1 === 0 ? 0 : 2).split('.');\n  const lastThree = intPart.slice(-3);\n  const rest = intPart.slice(0, -3);\n  const formatted = rest ? rest.replace(/\\B(?=(\\d{2})+(?!\\d))/g, ',') + ',' + lastThree : lastThree;\n  return (num < 0 ? '-' : '') + formatted + (decPart ? '.' + decPart : '');\n}\n\nfunction numToWords(n) {\n  n = Math.floor(Math.abs(n || 0));\n  if (n === 0) return 'Zero Rupees Only';\n  const ones = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine'
